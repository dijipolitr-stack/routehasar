<style>
:root{
  --bg:          #F0F4F8;
  --surface-1:   #FFFFFF;
  --surface-2:   #F8FAFC;
  --surface-3:   #EEF2F7;
  --border:      rgba(15,23,42,0.08);
  --border-md:   rgba(15,23,42,0.14);
  --border-hi:   rgba(15,23,42,0.26);
  --text-1:      #0F172A;
  --text-2:      #475569;
  --text-3:      #94A3B8;
  --blue:        #2563EB;
  --blue-dim:    rgba(37,99,235,0.08);
  --indigo:      #4F46E5;
  --indigo-dim:  rgba(79,70,229,0.08);
  --violet:      #7C3AED;
  --violet-dim:  rgba(124,58,237,0.08);
  --green:       #059669;
  --green-dim:   rgba(5,150,105,0.08);
  --amber:       #D97706;
  --amber-dim:   rgba(217,119,6,0.08);
  --red:         #DC2626;
  --red-dim:     rgba(220,38,38,0.08);
  --radius-sm:   6px;
  --radius-md:   10px;
  --radius-lg:   14px;
  --font-body:   'Plus Jakarta Sans','Segoe UI',sans-serif;
  --font-mono:   'IBM Plex Mono','JetBrains Mono',monospace;
  --shadow-sm:   0 1px 3px rgba(15,23,42,0.08),0 1px 2px rgba(15,23,42,0.04);
  --shadow-md:   0 4px 12px rgba(15,23,42,0.1),0 2px 4px rgba(15,23,42,0.06);
  --shadow-lg:   0 8px 24px rgba(15,23,42,0.12),0 4px 8px rgba(15,23,42,0.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{background:var(--bg);color:var(--text-1);font-family:var(--font-body);-webkit-font-smoothing:antialiased;font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#94A3B8}
button{transition:all .15s ease;font-family:inherit;cursor:pointer;outline:none}
button:active{transform:scale(0.97)}
input,textarea,select{outline:none;font-family:inherit}
input::placeholder,textarea::placeholder{color:var(--text-3)}

.glass-header{
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.card{
  background:var(--surface-1);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:18px;
  box-shadow:var(--shadow-sm);
}
.stat-card{
  background:var(--surface-1);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:16px 18px;
  box-shadow:var(--shadow-sm);
  position:relative;overflow:hidden;
  transition:box-shadow .2s,border-color .2s;
}
.stat-card:hover{box-shadow:var(--shadow-md);border-color:var(--border-md)}
.stat-card .glow{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;filter:blur(28px);opacity:.12;pointer-events:none}

.inp{
  width:100%;
  background:#FFFFFF;
  border:1.5px solid var(--border-md);
  border-radius:var(--radius-md);
  color:var(--text-1);
  padding:11px 14px;
  font-size:13px;
  transition:border-color .2s,box-shadow .2s;
}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,0.12)}
.inp.error{border-color:var(--red);background:rgba(220,38,38,0.03)}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:.2px;padding:3px 9px;border-radius:20px;border:1px solid transparent;white-space:nowrap}

.btn-primary{background:linear-gradient(135deg,#2563EB,#1D4ED8);border:none;color:#fff;border-radius:var(--radius-md);font-weight:700;font-size:13px;box-shadow:0 2px 8px rgba(37,99,235,0.3);transition:all .2s}
.btn-primary:hover{box-shadow:0 4px 16px rgba(37,99,235,0.4);filter:brightness(1.05)}
.btn-ghost{background:#F8FAFC;border:1px solid var(--border-md);color:var(--text-2);border-radius:var(--radius-md);font-size:12px;font-weight:600;transition:all .15s}
.btn-ghost:hover{background:#F1F5F9;border-color:var(--border-hi);color:var(--text-1)}
.btn-danger{background:rgba(220,38,38,0.08);border:1px solid rgba(220,38,38,0.2);color:#DC2626;border-radius:var(--radius-md);font-size:11px;font-weight:700;transition:all .15s}
.btn-danger:hover{background:rgba(220,38,38,0.14)}

.nav-tab{padding:13px 14px;background:none;border:none;border-radius:0;font-size:12px;font-weight:500;color:var(--text-3);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color .15s,border-color .15s}
.nav-tab:hover{color:var(--text-2)}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.nav-tab:active{transform:none}

.mob-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 16px rgba(15,23,42,0.08)}
.mob-nav-btn{flex:1;background:none;border:none;padding:8px 2px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;transition:none}
.mob-nav-btn:active{transform:none}

.toggle{position:relative;width:44px;height:24px;display:inline-block}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:#E2E8F0;border-radius:24px;transition:.25s;border:1px solid var(--border-md)}
.slider:before{content:"";position:absolute;height:16px;width:16px;left:4px;bottom:3px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(15,23,42,0.2)}
input:checked+.slider{background:var(--blue);border-color:transparent}
input:checked+.slider:before{transform:translateX(20px)}

.photo-card{transition:transform .2s,box-shadow .2s}
.photo-card:hover{transform:scale(1.02);box-shadow:var(--shadow-md)}
.photo-card:hover .photo-overlay{opacity:1!important}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes fadeUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popIn{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
</style>

const API_URL = "https://hasartrack-api-production.up.railway.app/api";

// API yardımcı fonksiyonu
async function apiCall(endpoint, method="GET", body=null) {
  const token = localStorage.getItem("ht_token");
  const opts = {
    method,
    headers: {
      "Content-Type": "application/json",
      ...(token ? { "Authorization": `Bearer ${token}` } : {})
    },
    ...(body ? { body: JSON.stringify(body) } : {})
  };
  const res = await fetch(`${API_URL}${endpoint}`, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: "Bağlantı hatası" }));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

function YeniParcaForm({onEkle, kategoriler}){
  const [acik,setAcik] = useState(false);
  const [form,setForm] = useState({parcaAdi:"",oem:"",kategori:"",yeniKategori:"",birim:"Adet",stok:"0",minStok:"1",ort_maliyet:""});
  const sf = (k,v) => setForm(p=>({...p,[k]:v}));

  const kaydet = () => {
    if(!form.parcaAdi) return;
    const kat = form.kategori==="__yeni" ? form.yeniKategori : form.kategori;
    onEkle({
      parcaAdi:  form.parcaAdi,
      oem:       form.oem,
      kategori:  kat || "Diğer",
      birim:     form.birim,
      stok:      parseFloat(form.stok)||0,
      minStok:   parseFloat(form.minStok)||1,
      ort_maliyet: parseFloat(form.ort_maliyet)||0,
    });
    setForm({parcaAdi:"",oem:"",kategori:"",yeniKategori:"",birim:"Adet",stok:"0",minStok:"1",ort_maliyet:""});

  const inpF=(k,ph,type="text",mono)=>(

    <div>

            display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"all .2s"}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(37,99,235,0.5)";e.currentTarget.style.background="rgba(37,99,235,0.09)";}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(37,99,235,0.3)";e.currentTarget.style.background="rgba(37,99,235,0.06)";}}>
          <span style={{fontSize:18}}>+</span> Yeni Parça / Ürün Ekle
        </button>
      ):(
        <div style={{background:"#F0F7FF",border:"1.5px solid rgba(37,99,235,0.2)",borderRadius:14,padding:18}}>
          <div style={{fontWeight:700,fontSize:14,color:"var(--blue)",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>➕ Yeni Parça / Ürün</span>
            <button onClick={()=>setAcik(false)} style={{background:"none",border:"none",color:"var(--text-3)",fontSize:18,cursor:"pointer",lineHeight:1}}>×</button>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div style={{gridColumn:"1/-1"}}>
              <LBL t="PARÇA / ÜRÜN ADI" req/>
              {inpF("parcaAdi","Örn: Sağ ön far komple, Motor yağı 5W-30...")}
            </div>

              <LBL t="OEM / PART NUMARASI"/>
              {inpF("oem","81130-0E100",undefined,true)}
            </div>

            <div>
              <LBL t="KATEGORİ"/>
              <select value={form.kategori} onChange={e=>sf("kategori",e.target.value)}

              {form.kategori==="__yeni"&&(
                <input value={form.yeniKategori} onChange={e=>sf("yeniKategori",e.target.value)}

                  style={{width:"100%",marginTop:6,background:"#fff",border:"1.5px solid rgba(37,99,235,0.4)",borderRadius:8,color:"var(--text-1)",padding:"8px 11px",fontSize:12}}/>
              )}

            <div>
              <LBL t="BİRİM"/>

              {inpF("stok","0","number")}

            <div>
              <LBL t="MİNİMUM STOK (uyarı eşiği)"/>

              <LBL t="ORTALAMA MALİYET ₺"/>

              {form.oem&&<span style={{fontFamily:"var(--font-mono)",color:"var(--text-3)"}}>{form.oem}</span>}

            </div>
          )}

          <div style={{display:"flex",gap:8}}>
            <button onClick={kaydet} disabled={!form.parcaAdi}
              style={{background:form.parcaAdi?"var(--blue)":"rgba(37,99,235,0.3)",border:"none",color:"#fff",
                borderRadius:8,padding:"10px 20px",fontSize:13,fontWeight:700}}>
              ✓ Stoka Ekle
            </button>
            <button onClick={()=>setAcik(false)}
              style={{background:"#F8FAFC",border:"1px solid var(--border-md)",color:"var(--text-2)",

          </div>
        </div>
      )}
    </div>
  );
}

// ─── STOK YÖNETİM MODÜLÜ ─────────────────────────────────────────────────
function StokYonetim({rol}){
  const [katalog,setKatalog]   = useState(STOK_KATALOG);
  const [satirAlmalar,setSatinAlmalar] = useState(SATIN_ALMALAR);
  const [hareketler,setHareketler] = useState(STOK_HAREKETLERI);
  const [tedarikcilar]         = useState(TEDARIKCILAR);
  const [aktifSekme,setAktifSekme] = useState("genel");
  const [isMobile,setIsMobile] = useState(false);
  const [yeniSatinAlModal,setYeniSatinAlModal] = useState(false);
  const [yeniKalem,setYeniKalem] = useState({stokId:"",parcaAdi:"",adet:"1",birimFiyatKdvsiz:"",kdv:"20"});
  const [satinAlForm,setSatinAlForm] = useState({tedarikciId:"",faturaNo:"",faturaTarihi:"",vadeTarihi:"",kalemler:[],odemeDurumu:"bekliyor"});
  const [filtre,setFiltre] = useState("tumu");
  useEffect(()=>{const c=()=>setIsMobile(window.innerWidth<768);c();window.addEventListener("resize",c);return()=>window.removeEventListener("resize",c);},[]);

  const servisEdit = rol==="servis";

  // Hesaplamalar
  const kritikStok  = katalog.filter(p=>p.stok<=p.minStok);
  const sifirStok   = katalog.filter(p=>p.stok===0);
  const toplamMaliyet = katalog.reduce((s,p)=>s+p.stok*p.ort_maliyet,0);
  const bekleyenOdeme = satirAlmalar.filter(sa=>sa.odemeDurumu!=="ödendi").reduce((s,sa)=>s+sa.toplamKdvli,0);
  const vadesiGecen = satirAlmalar.filter(sa=>{
    if(sa.odemeDurumu==="ödendi")return false;
    const vade=new Date(sa.vadeTarihi.split(".").reverse().join("-"));
    return vade<new Date();
  });

  const kalemEkle=()=>{
    if(!yeniKalem.parcaAdi||!yeniKalem.birimFiyatKdvsiz)return;
    const k={...yeniKalem,id:"k"+Date.now(),adet:parseFloat(yeniKalem.adet)||1,birimFiyatKdvsiz:parseFloat(yeniKalem.birimFiyatKdvsiz)||0,kdv:parseFloat(yeniKalem.kdv)||20};
    setSatinAlForm(p=>({...p,kalemler:[...p.kalemler,k]}));
    setYeniKalem({stokId:"",parcaAdi:"",adet:"1",birimFiyatKdvsiz:"",kdv:"20"});
  };

  const satinAlKaydet=()=>{
    if(!satinAlForm.faturaNo||!satinAlForm.kalemler.length)return;
    const toplamKdvsiz=satinAlForm.kalemler.reduce((s,k)=>s+k.birimFiyatKdvsiz*k.adet,0);
    const toplamKdvli=satinAlForm.kalemler.reduce((s,k)=>s+k.birimFiyatKdvsiz*k.adet*(1+k.kdv/100),0);
    const yeniSA={id:"sa"+Date.now(),...satinAlForm,toplamKdvsiz,toplamKdvli,odemeTarihi:""};
    setSatinAlmalar(p=>[...p,yeniSA]);
    // Stok güncelle
    satinAlForm.kalemler.forEach(k=>{
      if(k.stokId){
        setKatalog(p=>p.map(s=>s.id===k.stokId?{...s,stok:s.stok+k.adet}:s));
      }
      setHareketler(p=>[...p,{id:"h"+Date.now()+Math.random(),tip:"giris",stokId:k.stokId,parcaAdi:k.parcaAdi,adet:k.adet,tarih:satinAlForm.faturaTarihi||new Date().toLocaleDateString("tr-TR"),satinAlmaId:yeniSA.id,dosyaId:null,aciklama:"Satın alma — "+satinAlForm.faturaNo}]);
    });
    setSatinAlForm({tedarikciId:"",faturaNo:"",faturaTarihi:"",vadeTarihi:"",kalemler:[],odemeDurumu:"bekliyor"});
    setYeniSatinAlModal(false);
  };

  const odemeYap=(id)=>setSatinAlmalar(p=>p.map(sa=>sa.id===id?{...sa,odemeDurumu:"ödendi",odemeTarihi:new Date().toLocaleDateString("tr-TR")}:sa));

  const SEKMELER=[
    {id:"genel",l:"Genel Bakış",mi:"📦"},
    {id:"stok",l:"Stok Listesi",mi:"🗂️"},
    {id:"satin",l:"Satın Alma",mi:"🧾",badge:vadesiGecen.length},
    {id:"hareketler",l:"Hareketler",mi:"↕️"},
    {id:"tedarikci",l:"Tedarikçiler",mi:"🏭"},
  ];

  const inpS=(val,set,ph,type="text")=>(
    <input type={type} value={val} onChange={e=>set(e.target.value)} placeholder={ph}
      style={{width:"100%",background:"#fff",border:"1.5px solid var(--border-md)",borderRadius:8,color:"var(--text-1)",padding:"9px 12px",fontSize:12}}/>
  );

  const TH=({children,right})=><th style={{textAlign:right?"right":"left",padding:"9px 12px",color:"var(--text-3)",fontWeight:700,fontSize:10,letterSpacing:".4px",whiteSpace:"nowrap"}}>{children}</th>;
  const TD=({children,right,mono,bold,color})=><td style={{padding:"9px 12px",textAlign:right?"right":"left",fontFamily:mono?"var(--font-mono)":"inherit",fontWeight:bold?700:400,color:color||"var(--text-1)",fontSize:12}}>{children}</td>;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div style={{fontWeight:800,fontSize:16,color:"var(--text-1)"}}>📦 Stok & Tedarik Yönetimi</div>
        {servisEdit&&<button onClick={()=>setYeniSatinAlModal(true)} style={{background:"var(--blue)",border:"none",color:"#fff",borderRadius:9,padding:"9px 18px",fontSize:13,fontWeight:700}}>+ Satın Alma Ekle</button>}
      </div>

      {/* Kritik stok uyarısı */}
      {kritikStok.length>0&&(
        <div style={{padding:"12px 16px",background:"rgba(217,119,6,0.07)",border:"1px solid rgba(217,119,6,0.25)",borderRadius:10,display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:20}}>⚠️</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:13,color:"#D97706",marginBottom:3}}>Kritik Stok Uyarısı — {kritikStok.length} ürün</div>
            <div style={{fontSize:11,color:"var(--text-2)"}}>{kritikStok.map(p=>`${p.parcaAdi} (${p.stok} adet)`).join(" · ")}</div>
          </div>
          {vadesiGecen.length>0&&<div style={{padding:"6px 12px",background:"rgba(220,38,38,0.08)",border:"1px solid rgba(220,38,38,0.2)",borderRadius:8,fontSize:11,fontWeight:700,color:"#DC2626"}}>⏰ {vadesiGecen.length} vadesi geçmiş ödeme</div>}
        </div>
      )}

      {/* Sekmeler */}
      <div style={{display:"flex",gap:2,borderBottom:"1px solid var(--border)",overflowX:"auto"}}>
        {SEKMELER.map(s=>(
          <button key={s.id} onClick={()=>setAktifSekme(s.id)}
            style={{padding:"10px 14px",background:"none",border:"none",borderBottom:`2px solid ${aktifSekme===s.id?"var(--blue)":"transparent"}`,
              color:aktifSekme===s.id?"var(--blue)":"var(--text-2)",fontSize:12,fontWeight:aktifSekme===s.id?700:500,
              whiteSpace:"nowrap",cursor:"pointer",marginBottom:-1,transition:"color .15s",position:"relative"}}>
            {isMobile?s.mi:s.mi+" "+s.l}
            {s.badge>0&&<span style={{position:"absolute",top:6,right:2,background:"#DC2626",color:"#fff",borderRadius:"50%",width:14,height:14,fontSize:8,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{s.badge}</span>}
          </button>
        ))}
      </div>

      {/* ── GENEL BAKIŞ ─────────────────────────────── */}
      {aktifSekme==="genel"&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"repeat(4,1fr)",gap:10}}>
            {[
              {l:"Toplam SKU",v:katalog.length,sub:"Farklı ürün",c:"var(--blue)"},
              {l:"Depo Değeri",v:`${toplamMaliyet.toLocaleString("tr-TR")} ₺`,sub:"Maliyet bazlı",c:"#059669"},
              {l:"Kritik Stok",v:kritikStok.length,sub:`${sifirStok.length} tükendi`,c:kritikStok.length>0?"#D97706":"#059669"},
              {l:"Bekleyen Ödeme",v:`${bekleyenOdeme.toLocaleString("tr-TR")} ₺`,sub:`${satirAlmalar.filter(s=>s.odemeDurumu!=="ödendi").length} fatura`,c:bekleyenOdeme>0?"#DC2626":"#059669"},
            ].map(k=>(
              <div key={k.l} style={{background:"#fff",border:"1px solid var(--border)",borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 3px rgba(15,23,42,0.06)"}}>
                <div style={{fontSize:9,color:"var(--text-3)",fontWeight:700,letterSpacing:".5px",marginBottom:5}}>{k.l.toUpperCase()}</div>
                <div style={{fontSize:isMobile?14:20,fontWeight:800,color:k.c,marginBottom:2}}>{k.v}</div>
                <div style={{fontSize:9,color:"var(--text-3)"}}>{k.sub}</div>
              </div>
            ))}
          </div>

          {/* Stok durum özeti */}
          <div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:12,padding:16,boxShadow:"0 1px 3px rgba(15,23,42,0.06)"}}>
            <div style={{fontWeight:700,fontSize:12,color:"var(--text-2)",letterSpacing:".3px",textTransform:"uppercase",marginBottom:12}}>📊 Kategori Bazlı Stok Değeri</div>
            {Object.entries(katalog.reduce((acc,p)=>{
              if(!acc[p.kategori])acc[p.kategori]={deger:0,adet:0,kritik:0};
              acc[p.kategori].deger+=p.stok*p.ort_maliyet;
              acc[p.kategori].adet+=p.stok;
              if(p.stok<=p.minStok)acc[p.kategori].kritik++;
              return acc;
            },{})).sort((a,b)=>b[1].deger-a[1].deger).map(([kat,v])=>{
              const maxDeger=Math.max(...Object.values(katalog.reduce((acc,p)=>{if(!acc[p.kategori])acc[p.kategori]=0;acc[p.kategori]+=p.stok*p.ort_maliyet;return acc;},{})));
              return(
                <div key={kat} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:12,color:"var(--text-1)",fontWeight:500}}>{kat} {v.kritik>0&&<span style={{fontSize:9,color:"#D97706",fontWeight:700,background:"rgba(217,119,6,0.1)",padding:"1px 5px",borderRadius:4}}>⚠ {v.kritik}</span>}</span>
                    <span style={{fontSize:11,fontFamily:"var(--font-mono)",color:"var(--text-2)",fontWeight:600}}>{v.deger.toLocaleString("tr-TR")} ₺</span>
                  </div>
                  <div style={{height:6,background:"#F1F5F9",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.round((v.deger/maxDeger)*100)}%`,background:"var(--blue)",borderRadius:3}}/></div>
                </div>
              );
            })}
          </div>

          {/* Vadesi yaklaşan/geçen ödemeler */}
          {satirAlmalar.filter(sa=>sa.odemeDurumu!=="ödendi").length>0&&(
            <div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:12,padding:16,boxShadow:"0 1px 3px rgba(15,23,42,0.06)"}}>
              <div style={{fontWeight:700,fontSize:12,color:"var(--text-2)",letterSpacing:".3px",textTransform:"uppercase",marginBottom:12}}>📅 Bekleyen Ödemeler</div>
              {satirAlmalar.filter(sa=>sa.odemeDurumu!=="ödendi").map(sa=>{
                const t=tedarikcilar.find(t=>t.id===sa.tedarikciId);
                const vadeDate=new Date(sa.vadeTarihi.split(".").reverse().join("-"));
                const bugun=new Date(); bugun.setHours(0,0,0,0);
                const fark=Math.ceil((vadeDate-bugun)/(1000*60*60*24));
                const gecti=fark<0;
                const yakin=!gecti&&fark<=7;
                return(
                  <div key={sa.id} style={{display:"flex",gap:12,alignItems:"center",padding:"10px 0",borderBottom:"1px solid var(--border)",flexWrap:"wrap"}}>
                    <div style={{flex:1,minWidth:160}}>
                      <div style={{fontWeight:600,fontSize:13}}>{t?.ad}</div>
                      <div style={{fontSize:11,color:"var(--text-3)",fontFamily:"var(--font-mono)"}}>{sa.faturaNo}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontWeight:700,fontSize:14,fontFamily:"var(--font-mono)",color:"#DC2626"}}>{sa.toplamKdvli.toLocaleString("tr-TR")} ₺</div>
                      <div style={{fontSize:10,color:gecti?"#DC2626":yakin?"#D97706":"var(--text-3)",fontWeight:gecti||yakin?700:400}}>
                        {gecti?`⏰ ${Math.abs(fark)} gün gecikti`:yakin?`⚡ ${fark} gün kaldı`:`📅 ${sa.vadeTarihi}`}
                      </div>
                    </div>
                    {servisEdit&&<button onClick={()=>odemeYap(sa.id)} style={{background:"rgba(5,150,105,0.1)",border:"1px solid rgba(5,150,105,0.25)",color:"#059669",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,flexShrink:0}}>✓ Ödendi</button>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ── STOK LİSTESİ ────────────────────────────── */}
      {aktifSekme==="stok"&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {/* Yeni parça ekleme */}
          {servisEdit&&(
            <YeniParcaForm
              onEkle={(yeni)=>setKatalog(p=>[...p,{id:"s"+Date.now(),...yeni}])}
              kategoriler={[...new Set(katalog.map(p=>p.kategori))]}
            />
          )}
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {["tumu",...[...new Set(katalog.map(p=>p.kategori))]].map(f=>(
              <button key={f} onClick={()=>setFiltre(f)}
                style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${filtre===f?"var(--blue)":"var(--border-md)"}`,background:filtre===f?"rgba(37,99,235,0.08)":"#fff",color:filtre===f?"var(--blue)":"var(--text-2)",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                {f==="tumu"?"Tümü":f}
              </button>
            ))}
          </div>
          <div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 3px rgba(15,23,42,0.06)"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:"#F8FAFC",borderBottom:"1px solid var(--border)"}}>
                <TH>Parça Adı</TH><TH>OEM</TH><TH>Kategori</TH><TH right>Mevcut</TH><TH right>Min Stok</TH><TH right>Ort. Maliyet</TH><TH right>Depo Değeri</TH><TH>Durum</TH>
              </tr></thead>
              <tbody>
                {katalog.filter(p=>filtre==="tumu"||p.kategori===filtre).map((p,i)=>{
                  const tukendi=p.stok===0;
                  const kritik=p.stok>0&&p.stok<=p.minStok;
                  return(
                    <tr key={p.id} style={{borderBottom:"1px solid var(--border)",background:tukendi?"rgba(220,38,38,0.03)":kritik?"rgba(217,119,6,0.03)":i%2===0?"#fff":"#FAFBFC"}}>
                      <TD bold>{p.parcaAdi}</TD>
                      <TD mono color="var(--text-3)">{p.oem||"—"}</TD>
                      <TD><span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:"rgba(37,99,235,0.08)",color:"var(--blue)",fontWeight:600}}>{p.kategori}</span></TD>
                      <TD right bold color={tukendi?"#DC2626":kritik?"#D97706":"var(--text-1)"}>{p.stok}</TD>
                      <TD right color="var(--text-3)">{p.minStok}</TD>
                      <TD right mono color="var(--text-2)">{p.ort_maliyet.toLocaleString("tr-TR")} ₺</TD>
                      <TD right mono bold color="var(--blue)">{(p.stok*p.ort_maliyet).toLocaleString("tr-TR")} ₺</TD>
                      <TD>
                        <span style={{fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:20,
                          background:tukendi?"rgba(220,38,38,0.1)":kritik?"rgba(217,119,6,0.1)":"rgba(5,150,105,0.1)",
                          color:tukendi?"#DC2626":kritik?"#D97706":"#059669",
                          border:`1px solid ${tukendi?"rgba(220,38,38,0.2)":kritik?"rgba(217,119,6,0.2)":"rgba(5,150,105,0.2)"}`}}>
                          {tukendi?"● Tükendi":kritik?"⚠ Kritik":"✓ Yeterli"}
                        </span>
                      </TD>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot><tr style={{borderTop:"2px solid var(--border)",background:"#F8FAFC"}}>
                <td colSpan={6} style={{padding:"10px 12px",fontWeight:700,fontSize:11,color:"var(--text-2)"}}>TOPLAM DEPO DEĞERİ</td>
                <TD right bold color="var(--blue)">{toplamMaliyet.toLocaleString("tr-TR")} ₺</TD>
                <td/>
              </tr></tfoot>
            </table>
          </div>
        </div>
      )}

      {/* ── SATIN ALMA ──────────────────────────────── */}
      {aktifSekme==="satin"&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {/* Satın alma formu */}
          {servisEdit&&yeniSatinAlModal&&(
            <div style={{background:"#F0F7FF",border:"1.5px solid rgba(37,99,235,0.2)",borderRadius:14,padding:18}}>
              <div style={{fontWeight:700,fontSize:14,color:"var(--blue)",marginBottom:14}}>🧾 Yeni Satın Alma</div>
              <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:10,marginBottom:14}}>
                <div>
                  <div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>TEDARİKÇİ</div>
                  <select value={satinAlForm.tedarikciId} onChange={e=>{const t=tedarikcilar.find(t=>t.id===e.target.value);const vade=t?new Date(Date.now()+t.vadeGun*86400000).toLocaleDateString("tr-TR"):"";setSatinAlForm(p=>({...p,tedarikciId:e.target.value,vadeTarihi:vade}));}}
                    style={{width:"100%",background:"#fff",border:"1.5px solid var(--border-md)",borderRadius:8,color:"var(--text-1)",padding:"9px 12px",fontSize:12}}>
                    <option value="">Tedarikçi seçin...</option>
                    {tedarikcilar.map(t=><option key={t.id} value={t.id}>{t.ad} ({t.vadeGun} gün vade)</option>)}
                  </select>
                </div>
                <div><div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>FATURA NO ✱</div>{inpS(satinAlForm.faturaNo,v=>setSatinAlForm(p=>({...p,faturaNo:v})),"FTR-2024-XXXX")}</div>
                <div><div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>FATURA TARİHİ</div>{inpS(satinAlForm.faturaTarihi,v=>setSatinAlForm(p=>({...p,faturaTarihi:v})),"GG.AA.YYYY")}</div>
                <div><div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>VADE TARİHİ</div>{inpS(satinAlForm.vadeTarihi,v=>setSatinAlForm(p=>({...p,vadeTarihi:v})),"GG.AA.YYYY")}</div>
              </div>

              {/* Kalem ekleme */}
              <div style={{fontWeight:700,fontSize:12,color:"var(--text-2)",marginBottom:8}}>Kalemler</div>
              <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"2fr 1fr 1fr 1fr auto",gap:8,marginBottom:8,alignItems:"end"}}>
                <div>
                  <div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>PARÇA</div>
                  <select value={yeniKalem.stokId} onChange={e=>{const s=katalog.find(s=>s.id===e.target.value);setYeniKalem(p=>({...p,stokId:e.target.value,parcaAdi:s?.parcaAdi||""}));}}
                    style={{width:"100%",background:"#fff",border:"1.5px solid var(--border-md)",borderRadius:8,color:"var(--text-1)",padding:"8px 10px",fontSize:12}}>
                    <option value="">Stoktan seç...</option>
                    {katalog.map(s=><option key={s.id} value={s.id}>{s.parcaAdi}</option>)}
                    <option value="__yeni">+ Yeni parça...</option>
                  </select>
                  {yeniKalem.stokId==="__yeni"&&<input value={yeniKalem.parcaAdi} onChange={e=>setYeniKalem(p=>({...p,parcaAdi:e.target.value}))} placeholder="Parça adı yazın" style={{width:"100%",marginTop:4,background:"#fff",border:"1.5px solid var(--border-md)",borderRadius:8,color:"var(--text-1)",padding:"8px 10px",fontSize:12}}/>}
                </div>
                <div><div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>ADET</div>{inpS(yeniKalem.adet,v=>setYeniKalem(p=>({...p,adet:v})),"1","number")}</div>
                <div><div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>BİRİM FİYAT (KDV'SİZ)</div>{inpS(yeniKalem.birimFiyatKdvsiz,v=>setYeniKalem(p=>({...p,birimFiyatKdvsiz:v})),"0","number")}</div>
                <div><div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>KDV %</div>
                  <select value={yeniKalem.kdv} onChange={e=>setYeniKalem(p=>({...p,kdv:e.target.value}))} style={{width:"100%",background:"#fff",border:"1.5px solid var(--border-md)",borderRadius:8,color:"var(--text-1)",padding:"8px 10px",fontSize:12}}>
                    <option value="0">0%</option><option value="10">10%</option><option value="20">20%</option>
                  </select>
                </div>
                <button onClick={kalemEkle} style={{background:"var(--blue)",border:"none",color:"#fff",borderRadius:8,padding:"9px 12px",fontSize:13,fontWeight:800,height:38}}>+</button>
              </div>

              {satinAlForm.kalemler.length>0&&(
                <div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:9,overflow:"hidden",marginBottom:12}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead><tr style={{background:"#F8FAFC",borderBottom:"1px solid var(--border)"}}><TH>Parça</TH><TH right>Adet</TH><TH right>KDV'siz</TH><TH right>KDV'li</TH><th style={{width:32}}/></tr></thead>
                    <tbody>
                      {satinAlForm.kalemler.map((k,i)=>(
                        <tr key={k.id} style={{borderBottom:"1px solid var(--border)"}}>
                          <TD>{k.parcaAdi}</TD>
                          <TD right>{k.adet}</TD>
                          <TD right mono>{(k.birimFiyatKdvsiz*k.adet).toLocaleString("tr-TR")} ₺</TD>
                          <TD right mono color="var(--blue)">{(k.birimFiyatKdvsiz*k.adet*(1+k.kdv/100)).toLocaleString("tr-TR")} ₺</TD>
                          <td><button onClick={()=>setSatinAlForm(p=>({...p,kalemler:p.kalemler.filter((_,j)=>j!==i)}))} style={{background:"none",border:"none",color:"#DC2626",fontSize:14,cursor:"pointer"}}>×</button></td>
                        </tr>
                      ))}
                    </tbody>
                    <tfoot><tr style={{background:"#F8FAFC",borderTop:"1px solid var(--border)"}}>
                      <td colSpan={2} style={{padding:"8px 12px",fontWeight:700,fontSize:11}}>TOPLAM</td>
                      <TD right mono bold>{satinAlForm.kalemler.reduce((s,k)=>s+k.birimFiyatKdvsiz*k.adet,0).toLocaleString("tr-TR")} ₺</TD>
                      <TD right mono bold color="var(--blue)">{satinAlForm.kalemler.reduce((s,k)=>s+k.birimFiyatKdvsiz*k.adet*(1+k.kdv/100),0).toLocaleString("tr-TR")} ₺</TD>
                      <td/>
                    </tr></tfoot>
                  </table>
                </div>
              )}
              <div style={{display:"flex",gap:8}}>
                <button onClick={satinAlKaydet} disabled={!satinAlForm.faturaNo||!satinAlForm.kalemler.length} style={{background:satinAlForm.kalemler.length?"var(--blue)":"rgba(37,99,235,0.3)",border:"none",color:"#fff",borderRadius:8,padding:"10px 20px",fontSize:13,fontWeight:700}}>✓ Kaydet & Stoğa Ekle</button>
                <button onClick={()=>setYeniSatinAlModal(false)} style={{background:"#F8FAFC",border:"1px solid var(--border-md)",color:"var(--text-2)",borderRadius:8,padding:"10px 16px",fontSize:13}}>İptal</button>
              </div>
            </div>
          )}

          {/* Satın alma listesi */}
          <div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 3px rgba(15,23,42,0.06)"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:"#F8FAFC",borderBottom:"1px solid var(--border)"}}>
                <TH>Tedarikçi</TH><TH>Fatura No</TH><TH>F. Tarihi</TH><TH>Vade</TH><TH right>KDV'siz</TH><TH right>KDV'li</TH><TH>Ödeme</TH>{servisEdit&&<TH/>}
              </tr></thead>
              <tbody>
                {satirAlmalar.map((sa,i)=>{
                  const t=tedarikcilar.find(t=>t.id===sa.tedarikciId);
                  const vadeDate=new Date(sa.vadeTarihi.split(".").reverse().join("-"));
                  const fark=Math.ceil((vadeDate-new Date())/(1000*60*60*24));
                  const gecti=sa.odemeDurumu!=="ödendi"&&fark<0;
                  return(
                    <tr key={sa.id} style={{borderBottom:"1px solid var(--border)",background:gecti?"rgba(220,38,38,0.03)":i%2===0?"#fff":"#FAFBFC"}}>
                      <TD bold>{t?.ad||"—"}</TD>
                      <TD mono color="var(--text-2)">{sa.faturaNo}</TD>
                      <TD mono color="var(--text-3)">{sa.faturaTarihi}</TD>
                      <td style={{padding:"9px 12px"}}>
                        <div style={{fontSize:11,fontFamily:"var(--font-mono)",color:gecti?"#DC2626":fark<=7&&sa.odemeDurumu!=="ödendi"?"#D97706":"var(--text-2)",fontWeight:gecti||fark<=7?700:400}}>
                          {sa.vadeTarihi}
                        </div>
                        {sa.odemeDurumu!=="ödendi"&&<div style={{fontSize:9,color:gecti?"#DC2626":"var(--text-3)"}}>
                          {gecti?`${Math.abs(fark)} gün gecikti`:fark===0?"Bugün":fark<=7?`${fark} gün kaldı`:""}
                        </div>}
                      </td>
                      <TD right mono>{sa.toplamKdvsiz.toLocaleString("tr-TR")} ₺</TD>
                      <TD right mono bold color="var(--blue)">{sa.toplamKdvli.toLocaleString("tr-TR")} ₺</TD>
                      <td style={{padding:"9px 12px"}}>
                        {sa.odemeDurumu==="ödendi"?(
                          <div>
                            <span style={{fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:20,background:"rgba(5,150,105,0.1)",color:"#059669",border:"1px solid rgba(5,150,105,0.2)"}}>✓ Ödendi</span>
                            <div style={{fontSize:9,color:"var(--text-3)",marginTop:2}}>{sa.odemeTarihi}</div>
                          </div>
                        ):(
                          <span style={{fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:20,background:gecti?"rgba(220,38,38,0.1)":"rgba(217,119,6,0.1)",color:gecti?"#DC2626":"#D97706",border:`1px solid ${gecti?"rgba(220,38,38,0.2)":"rgba(217,119,6,0.2)"}`}}>
                            {gecti?"⏰ Gecikti":"⏳ Bekliyor"}
                          </span>
                        )}
                      </td>
                      {servisEdit&&<td style={{padding:"9px 8px"}}>
                        {sa.odemeDurumu!=="ödendi"&&<button onClick={()=>odemeYap(sa.id)} style={{background:"rgba(5,150,105,0.1)",border:"1px solid rgba(5,150,105,0.25)",color:"#059669",borderRadius:7,padding:"4px 10px",fontSize:10,fontWeight:700}}>✓ Ödendi</button>}
                      </td>}
                    </tr>
                  );
                })}
              </tbody>
              <tfoot><tr style={{borderTop:"2px solid var(--border)",background:"#F8FAFC"}}>
                <td colSpan={4} style={{padding:"10px 12px",fontWeight:700,fontSize:11,color:"var(--text-2)"}}>TOPLAM</td>
                <TD right mono bold>{satirAlmalar.reduce((s,sa)=>s+sa.toplamKdvsiz,0).toLocaleString("tr-TR")} ₺</TD>
                <TD right mono bold color="var(--blue)">{satirAlmalar.reduce((s,sa)=>s+sa.toplamKdvli,0).toLocaleString("tr-TR")} ₺</TD>
                <td colSpan={servisEdit?2:1} style={{padding:"10px 12px"}}><span style={{fontSize:10,color:"#DC2626",fontWeight:700}}>Bekleyen: {bekleyenOdeme.toLocaleString("tr-TR")} ₺</span></td>
              </tr></tfoot>
            </table>
          </div>
        </div>
      )}

      {/* ── HAREKETLER ──────────────────────────────── */}
      {aktifSekme==="hareketler"&&(
        <div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 3px rgba(15,23,42,0.06)"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr style={{background:"#F8FAFC",borderBottom:"1px solid var(--border)"}}>
              <TH>Tarih</TH><TH>Tip</TH><TH>Parça</TH><TH right>Adet</TH><TH>Kaynak / Hedef</TH><TH>Açıklama</TH>
            </tr></thead>
            <tbody>
              {[...hareketler].reverse().map((h,i)=>(
                <tr key={h.id} style={{borderBottom:"1px solid var(--border)",background:i%2===0?"#fff":"#FAFBFC"}}>
                  <TD mono color="var(--text-3)">{h.tarih}</TD>
                  <td style={{padding:"9px 12px"}}>
                    <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,
                      background:h.tip==="giris"?"rgba(5,150,105,0.1)":"rgba(220,38,38,0.08)",
                      color:h.tip==="giris"?"#059669":"#DC2626",
                      border:`1px solid ${h.tip==="giris"?"rgba(5,150,105,0.2)":"rgba(220,38,38,0.15)"}`}}>
                      {h.tip==="giris"?"↑ Giriş":"↓ Çıkış"}
                    </span>
                  </td>
                  <TD bold>{h.parcaAdi}</TD>
                  <TD right bold color={h.tip==="giris"?"#059669":"#DC2626"}>{h.tip==="giris"?"+":"-"}{h.adet}</TD>
                  <td style={{padding:"9px 12px",fontSize:11}}>
                    {h.dosyaId&&<span style={{fontFamily:"var(--font-mono)",color:"var(--blue)",background:"rgba(37,99,235,0.08)",padding:"2px 7px",borderRadius:5,fontSize:10}}>{h.dosyaId}</span>}
                    {h.satinAlmaId&&<span style={{color:"var(--text-3)",fontSize:10}}>Satın Alma</span>}
                  </td>
                  <TD color="var(--text-2)">{h.aciklama}</TD>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* ── TEDARİKÇİLER ────────────────────────────── */}
      {aktifSekme==="tedarikci"&&(
        <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:12}}>
          {tedarikcilar.map(t=>{
            const sAToplam=satirAlmalar.filter(sa=>sa.tedarikciId===t.id).reduce((s,sa)=>s+sa.toplamKdvli,0);
            const bekleyen=satirAlmalar.filter(sa=>sa.tedarikciId===t.id&&sa.odemeDurumu!=="ödendi").reduce((s,sa)=>s+sa.toplamKdvli,0);
            const faturaSayisi=satirAlmalar.filter(sa=>sa.tedarikciId===t.id).length;
            return(
              <div key={t.id} style={{background:"#fff",border:"1px solid var(--border)",borderRadius:12,padding:18,boxShadow:"0 1px 3px rgba(15,23,42,0.06)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                  <div>
                    <div style={{fontWeight:800,fontSize:15,color:"var(--text-1)",marginBottom:3}}>🏭 {t.ad}</div>
                    <div style={{fontSize:11,color:"var(--text-3)"}}>{t.il} · {faturaSayisi} fatura</div>
                  </div>
                  <span style={{fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:20,background:"rgba(37,99,235,0.08)",color:"var(--blue)",border:"1px solid rgba(37,99,235,0.2)"}}>
                    {t.vadeGun>0?`${t.vadeGun} gün vade`:"Peşin"}
                  </span>
                </div>
                <div style={{display:"flex",gap:8,marginBottom:12}}>
                  <a href={`tel:${t.telefon}`} style={{fontSize:12,color:"var(--blue)",textDecoration:"none"}}>📞 {t.telefon}</a>
                  <span style={{color:"var(--text-3)"}}>·</span>
                  <span style={{fontSize:12,color:"var(--text-2)"}}>✉ {t.email}</span>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:t.notlar?10:0}}>
                  <div style={{flex:1,padding:"10px 12px",background:"#F8FAFC",borderRadius:9,border:"1px solid var(--border)"}}>
                    <div style={{fontSize:9,color:"var(--text-3)",fontWeight:700,marginBottom:3}}>TOPLAM ALIŞ</div>
                    <div style={{fontSize:14,fontWeight:800,color:"var(--text-1)",fontFamily:"var(--font-mono)"}}>{sAToplam.toLocaleString("tr-TR")} ₺</div>
                  </div>
                  <div style={{flex:1,padding:"10px 12px",background:bekleyen>0?"rgba(217,119,6,0.05)":"#F8FAFC",borderRadius:9,border:`1px solid ${bekleyen>0?"rgba(217,119,6,0.2)":"var(--border)"}`}}>
                    <div style={{fontSize:9,color:bekleyen>0?"#D97706":"var(--text-3)",fontWeight:700,marginBottom:3}}>BEKLEYEN</div>
                    <div style={{fontSize:14,fontWeight:800,color:bekleyen>0?"#D97706":"var(--text-1)",fontFamily:"var(--font-mono)"}}>{bekleyen.toLocaleString("tr-TR")} ₺</div>
                  </div>
                </div>
                {t.notlar&&<div style={{fontSize:11,color:"var(--text-3)",padding:"8px 10px",background:"#F8FAFC",borderRadius:7,border:"1px solid var(--border)"}}>📝 {t.notlar}</div>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


// ─── PARÇA YÖNETİM BİLEŞENİ ──────────────────────────────────────────────
function ParcaYonetim({dosyaId, rol}){
  const initData = DEMO_PARCALAR[dosyaId] || {girisler:[], cikislar:[]};
  const [girisler, setGirisler] = useState(initData.girisler);
  const [cikislar, setCikislar] = useState(initData.cikislar);
  const [aktifSekme, setAktifSekme] = useState("ozet");
  const [girisModal, setGirisModal] = useState(false);
  const [cikisModal, setCikisModal] = useState(false);
  const [isMobile, setIsMobile] = useState(false);
  useEffect(()=>{const c=()=>setIsMobile(window.innerWidth<768);c();window.addEventListener("resize",c);return()=>window.removeEventListener("resize",c);},[]);

  const servisEdit = rol === "servis";

  // Hesaplamalar
  const toplamAlis    = girisler.reduce((s,g) => s + g.alisFiyati * g.adet, 0);
  const toplamAlisKdvsiz = girisler.reduce((s,g) => s + g.alisKdvsiz * g.adet, 0);
  const toplamSatis   = cikislar.reduce((s,c) => s + c.satirFiyati * c.adet, 0);
  const toplamSatisKdvli = cikislar.reduce((s,c) => s + c.toplamKdvli, 0);
  const karMarji      = toplamSatis - toplamAlisKdvsiz;
  const karYuzdesi    = toplamAlisKdvsiz > 0 ? Math.round((karMarji / toplamAlisKdvsiz) * 100) : 0;
  const odenmis       = girisler.filter(g=>g.odemeDurumu==="ödendi").reduce((s,g)=>s+g.alisFiyati*g.adet,0);
  const bekleyen      = girisler.filter(g=>g.odemeDurumu==="bekliyor").reduce((s,g)=>s+g.alisFiyati*g.adet,0);

  const [yeniGiris, setYeniGiris] = useState({tedarikci:"",faturaNo:"",parcaAdi:"",oem:"",adet:"1",alisKdvsiz:"",kdvOrani:"20",odemeDurumu:"bekliyor",notlar:""});
  const [yeniCikis, setYeniCikis] = useState({parcaAdi:"",girisId:"",adet:"1",satirFiyati:"",kdvOrani:"20",teknisyen:""});

  const girisEkle = () => {
    if(!yeniGiris.parcaAdi || !yeniGiris.alisKdvsiz) return;
    const alis = parseFloat(yeniGiris.alisKdvsiz)||0;
    const kdv  = parseFloat(yeniGiris.kdvOrani)||20;
    const adet = parseFloat(yeniGiris.adet)||1;
    setGirisler(p=>[...p,{
      id:"g"+Date.now(), tarih:new Date().toLocaleDateString("tr-TR"),
      tedarikci:yeniGiris.tedarikci, faturaNo:yeniGiris.faturaNo,
      parcaAdi:yeniGiris.parcaAdi, oem:yeniGiris.oem, adet,
      alisKdvsiz:alis, kdvOrani:kdv, alisFiyati:alis*(1+kdv/100),
      odemeDurumu:yeniGiris.odemeDurumu, odemeTarihi:"", notlar:yeniGiris.notlar
    }]);
    setYeniGiris({tedarikci:"",faturaNo:"",parcaAdi:"",oem:"",adet:"1",alisKdvsiz:"",kdvOrani:"20",odemeDurumu:"bekliyor",notlar:""});
    setGirisModal(false);
  };

  const cikisEkle = () => {
    if(!yeniCikis.parcaAdi || !yeniCikis.satirFiyati) return;
    const fiyat = parseFloat(yeniCikis.satirFiyati)||0;
    const kdv   = parseFloat(yeniCikis.kdvOrani)||20;
    const adet  = parseFloat(yeniCikis.adet)||1;
    setCikislar(p=>[...p,{
      id:"c"+Date.now(), girisId:yeniCikis.girisId, dosyaId,
      parcaAdi:yeniCikis.parcaAdi, adet,
      satirFiyati:fiyat, kdvOrani:kdv, toplamKdvli:fiyat*adet*(1+kdv/100),
      tarih:new Date().toLocaleDateString("tr-TR"), teknisyen:yeniCikis.teknisyen
    }]);
    setYeniCikis({parcaAdi:"",girisId:"",adet:"1",satirFiyati:"",kdvOrani:"20",teknisyen:""});
    setCikisModal(false);
  };

  const inp2=(val,set,ph,type="text",mono)=>(
    <input type={type} value={val} onChange={e=>set(e.target.value)} placeholder={ph}
      style={{width:"100%",background:"#fff",border:"1.5px solid var(--border-md)",borderRadius:8,
        color:"var(--text-1)",padding:"9px 12px",fontSize:12,fontFamily:mono?"var(--font-mono)":"inherit"}}/>
  );

  const SEKMELER = [{id:"ozet",l:"📊 Özet"},{id:"giris",l:"📥 Parça Girişi"},{id:"cikis",l:"📤 Kullanım"},{id:"tedarikciler",l:"🏭 Tedarikçiler"}];

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* Sekme */}
      <div style={{display:"flex",gap:2,borderBottom:"1px solid var(--border)",overflowX:"auto"}}>
        {SEKMELER.map(s=>(
          <button key={s.id} onClick={()=>setAktifSekme(s.id)}
            style={{padding:"10px 14px",background:"none",border:"none",borderBottom:`2px solid ${aktifSekme===s.id?"var(--blue)":"transparent"}`,
              color:aktifSekme===s.id?"var(--blue)":"var(--text-2)",fontSize:12,fontWeight:aktifSekme===s.id?700:500,
              whiteSpace:"nowrap",cursor:"pointer",marginBottom:-1,transition:"color .15s"}}>
            {s.l}
          </button>
        ))}
      </div>

      {/* ÖZET */}
      {aktifSekme==="ozet"&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {/* KPI kartları */}
          <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"repeat(4,1fr)",gap:10}}>
            {[
              {l:"Toplam Alış (KDV'li)", v:`${toplamAlis.toLocaleString("tr-TR")} ₺`,  c:"#DC2626",  sub:`${girisler.length} kalem`},
              {l:"Toplam Satış (KDV'siz)",v:`${toplamSatis.toLocaleString("tr-TR")} ₺`, c:"var(--blue)",sub:`${cikislar.length} kullanım`},
              {l:"Kâr Marjı",            v:`${karMarji>=0?"+":""}${karMarji.toLocaleString("tr-TR")} ₺`, c:karMarji>=0?"#059669":"#DC2626",sub:`%${karYuzdesi}`},
              {l:"Bekleyen Ödeme",       v:`${bekleyen.toLocaleString("tr-TR")} ₺`,      c:bekleyen>0?"#D97706":"#059669",sub:`${girisler.filter(g=>g.odemeDurumu==="bekliyor").length} fatura`},
            ].map(k=>(
              <div key={k.l} style={{background:"#fff",border:"1px solid var(--border)",borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 3px rgba(15,23,42,0.06)"}}>
                <div style={{fontSize:9,color:"var(--text-3)",fontWeight:700,letterSpacing:".5px",marginBottom:5}}>{k.l.toUpperCase()}</div>
                <div style={{fontSize:isMobile?14:18,fontWeight:800,color:k.c,marginBottom:2}}>{k.v}</div>
                <div style={{fontSize:9,color:"var(--text-3)"}}>{k.sub}</div>
              </div>
            ))}
          </div>

          {/* Maliyet vs Satış karşılaştırma */}
          <div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:12,padding:16,boxShadow:"0 1px 3px rgba(15,23,42,0.06)"}}>
            <div style={{fontWeight:700,fontSize:12,color:"var(--text-2)",letterSpacing:".3px",textTransform:"uppercase",marginBottom:14}}>💹 Maliyet / Satış Analizi</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {[
                {l:"Tedarikçiye Ödenen (KDV'li)",  v:toplamAlis,     c:"#EF4444",pct:100},
                {l:"Tedarikçiye Ödenen (KDV'siz)", v:toplamAlisKdvsiz, c:"#F97316",pct:toplamAlis>0?Math.round((toplamAlisKdvsiz/toplamAlis)*100):0},
                {l:"Sigorta'ya Faturalandı (KDV'siz)",v:toplamSatis,  c:"var(--blue)",pct:toplamAlis>0?Math.round((toplamSatis/toplamAlis)*100):0},
                {l:"Sigorta'ya Faturalandı (KDV'li)", v:toplamSatisKdvli,c:"#059669",pct:toplamAlis>0?Math.round((toplamSatisKdvli/toplamAlis)*100):0},
              ].map(r=>(
                <div key={r.l}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:11,color:"var(--text-2)"}}>{r.l}</span>
                    <span style={{fontSize:12,fontWeight:700,color:r.c,fontFamily:"var(--font-mono)"}}>{r.v.toLocaleString("tr-TR")} ₺</span>
                  </div>
                  <div style={{height:6,background:"#F1F5F9",borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${Math.min(r.pct,100)}%`,background:r.c,borderRadius:3,transition:"width .5s"}}/>
                  </div>
                </div>
              ))}
            </div>
            {karMarji>0&&(
              <div style={{marginTop:14,padding:"11px 14px",background:"rgba(5,150,105,0.08)",border:"1px solid rgba(5,150,105,0.2)",borderRadius:9,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,fontWeight:600,color:"#059669"}}>Net Kâr (KDV'siz alış / KDV'siz satış farkı)</span>
                <span style={{fontSize:16,fontWeight:800,color:"#059669",fontFamily:"var(--font-mono)"}}>+{karMarji.toLocaleString("tr-TR")} ₺ (%{karYuzdesi})</span>
              </div>
            )}
          </div>

          {/* Ödeme durumu */}
          <div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:12,padding:16,boxShadow:"0 1px 3px rgba(15,23,42,0.06)"}}>
            <div style={{fontWeight:700,fontSize:12,color:"var(--text-2)",letterSpacing:".3px",textTransform:"uppercase",marginBottom:12}}>💳 Tedarikçi Ödeme Durumu</div>
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
              {[{l:"Ödendi",v:odenmis,c:"#059669"},{l:"Bekliyor",v:bekleyen,c:"#D97706"},{l:"Toplam",v:toplamAlis,c:"var(--blue)"}].map(k=>(
                <div key={k.l} style={{flex:1,minWidth:100,background:"#F8FAFC",borderRadius:9,padding:"10px 12px",border:"1px solid var(--border)"}}>
                  <div style={{fontSize:9,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>{k.l.toUpperCase()}</div>
                  <div style={{fontSize:14,fontWeight:800,color:k.c,fontFamily:"var(--font-mono)"}}>{k.v.toLocaleString("tr-TR")} ₺</div>
                </div>
              ))}
            </div>
            <div style={{height:8,background:"#F1F5F9",borderRadius:4,overflow:"hidden"}}>
              <div style={{height:"100%",width:toplamAlis>0?`${Math.round((odenmis/toplamAlis)*100)}%`:"0%",background:"#059669",borderRadius:4,transition:"width .6s"}}/>
            </div>
            <div style={{fontSize:11,color:"var(--text-3)",marginTop:5}}>%{toplamAlis>0?Math.round((odenmis/toplamAlis)*100):0} ödendi</div>
          </div>
        </div>
      )}

      {/* PARÇA GİRİŞİ */}
      {aktifSekme==="giris"&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
            <div style={{fontSize:12,color:"var(--text-2)"}}>Tedarikçilerden alınan parçaların kaydı</div>
            {servisEdit&&(
              <button onClick={()=>setGirisModal(true)}
                style={{background:"var(--blue)",border:"none",color:"#fff",borderRadius:8,padding:"8px 16px",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>
                + Parça Girişi Ekle
              </button>
            )}
          </div>

          {/* Giriş formu modal */}
          {servisEdit&&girisModal&&(
            <div style={{background:"#F0F7FF",border:"1.5px solid rgba(37,99,235,0.25)",borderRadius:12,padding:16}}>
              <div style={{fontWeight:700,fontSize:13,color:"var(--blue)",marginBottom:14}}>📥 Yeni Parça Girişi</div>
              <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:10,marginBottom:10}}>
                <div><div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>TEDARİKÇİ ADI</div>{inp2(yeniGiris.tedarikci,v=>setYeniGiris(p=>({...p,tedarikci:v})),"Oto Parça A.Ş.")}</div>
                <div><div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>FATURA NO</div>{inp2(yeniGiris.faturaNo,v=>setYeniGiris(p=>({...p,faturaNo:v})),"FTR-2024-XXXX",undefined,true)}</div>
                <div><div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>PARÇA ADI ✱</div>{inp2(yeniGiris.parcaAdi,v=>setYeniGiris(p=>({...p,parcaAdi:v})),"Sağ ön far komple")}</div>
                <div><div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>OEM / PART NO</div>{inp2(yeniGiris.oem,v=>setYeniGiris(p=>({...p,oem:v})),"81130-0E100",undefined,true)}</div>
                <div><div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>ADET</div>{inp2(yeniGiris.adet,v=>setYeniGiris(p=>({...p,adet:v})),"1","number")}</div>
                <div><div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>ALIŞ FİYATI (KDV'SİZ) ₺ ✱</div>{inp2(yeniGiris.alisKdvsiz,v=>setYeniGiris(p=>({...p,alisKdvsiz:v})),"0","number")}</div>
                <div><div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>KDV ORANI %</div>
                  <select value={yeniGiris.kdvOrani} onChange={e=>setYeniGiris(p=>({...p,kdvOrani:e.target.value}))}
                    style={{width:"100%",background:"#fff",border:"1.5px solid var(--border-md)",borderRadius:8,color:"var(--text-1)",padding:"9px 12px",fontSize:12}}>
                    <option value="0">0%</option><option value="10">10%</option><option value="20">20%</option>
                  </select>
                </div>
                <div><div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>ÖDEME DURUMU</div>
                  <select value={yeniGiris.odemeDurumu} onChange={e=>setYeniGiris(p=>({...p,odemeDurumu:e.target.value}))}
                    style={{width:"100%",background:"#fff",border:"1.5px solid var(--border-md)",borderRadius:8,color:"var(--text-1)",padding:"9px 12px",fontSize:12}}>
                    <option value="bekliyor">Bekliyor</option><option value="ödendi">Ödendi</option><option value="vadeli">Vadeli</option>
                  </select>
                </div>
              </div>
              <div style={{marginBottom:10}}><div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>NOT</div>{inp2(yeniGiris.notlar,v=>setYeniGiris(p=>({...p,notlar:v})),"Vade tarihi, özel not...")}</div>
              {yeniGiris.alisKdvsiz&&(
                <div style={{padding:"8px 12px",background:"rgba(37,99,235,0.06)",borderRadius:8,fontSize:11,color:"var(--blue)",marginBottom:10}}>
                  KDV'li tutar: <strong>{((parseFloat(yeniGiris.alisKdvsiz)||0)*(1+(parseFloat(yeniGiris.kdvOrani)||20)/100)*(parseFloat(yeniGiris.adet)||1)).toLocaleString("tr-TR")} ₺</strong>
                </div>
              )}
              <div style={{display:"flex",gap:8}}>
                <button onClick={girisEkle} style={{background:"var(--blue)",border:"none",color:"#fff",borderRadius:8,padding:"9px 18px",fontSize:12,fontWeight:700}}>✓ Kaydet</button>
                <button onClick={()=>setGirisModal(false)} style={{background:"#F8FAFC",border:"1px solid var(--border-md)",color:"var(--text-2)",borderRadius:8,padding:"9px 14px",fontSize:12}}>İptal</button>
              </div>
            </div>
          )}

          {/* Giriş listesi */}
          {girisler.length===0?(
            <div style={{textAlign:"center",padding:"32px 20px",color:"var(--text-3)",background:"#F8FAFC",borderRadius:12,border:"1px solid var(--border)"}}>
              <div style={{fontSize:36,marginBottom:8}}>📦</div>

                </thead>
                <tbody>
                  {girisler.map((g,i)=>(
                    <tr key={g.id} style={{borderBottom:"1px solid var(--border)",background:i%2===0?"#fff":"#FAFBFC"}}>
                      <td style={{padding:"9px 12px",fontFamily:"var(--font-mono)",fontSize:11,color:"var(--text-2)"}}>{g.tarih}</td>
                      <td style={{padding:"9px 12px",fontWeight:600,color:"var(--text-1)"}}>{g.tedarikci}<div style={{fontSize:10,color:"var(--text-3)"}}>{g.faturaNo}</div></td>
                      <td style={{padding:"9px 12px",color:"var(--text-1)"}}>{g.parcaAdi}</td>
                      <td style={{padding:"9px 12px",fontFamily:"var(--font-mono)",fontSize:10,color:"var(--text-3)"}}>{g.oem||"—"}</td>
                      <td style={{padding:"9px 12px",textAlign:"right",color:"var(--text-2)"}}>{g.adet}</td>
                      <td style={{padding:"9px 12px",textAlign:"right",fontFamily:"var(--font-mono)",fontWeight:600,color:"#DC2626"}}>{(g.alisKdvsiz*g.adet).toLocaleString("tr-TR")} ₺</td>
                      <td style={{padding:"9px 12px",textAlign:"right",fontFamily:"var(--font-mono)",color:"#F97316"}}>{(g.alisFiyati*g.adet).toLocaleString("tr-TR")} ₺</td>
                      <td style={{padding:"9px 12px"}}>
                        <span style={{fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:20,
                          background:g.odemeDurumu==="ödendi"?"rgba(5,150,105,0.1)":g.odemeDurumu==="vadeli"?"rgba(37,99,235,0.1)":"rgba(217,119,6,0.1)",
                          color:g.odemeDurumu==="ödendi"?"#059669":g.odemeDurumu==="vadeli"?"var(--blue)":"#D97706",
                          border:`1px solid ${g.odemeDurumu==="ödendi"?"rgba(5,150,105,0.25)":g.odemeDurumu==="vadeli"?"rgba(37,99,235,0.25)":"rgba(217,119,6,0.25)"}`}}>
                          {g.odemeDurumu==="ödendi"?"✓ Ödendi":g.odemeDurumu==="vadeli"?"◷ Vadeli":"⏳ Bekliyor"}
                        </span>
                        {g.notlar&&<div style={{fontSize:10,color:"var(--text-3)",marginTop:2}}>{g.notlar}</div>}
                      </td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr style={{borderTop:"2px solid var(--border)",background:"#F8FAFC"}}>
                    <td colSpan={5} style={{padding:"10px 12px",fontWeight:700,fontSize:11,color:"var(--text-2)"}}>TOPLAM</td>
                    <td style={{padding:"10px 12px",textAlign:"right",fontWeight:800,color:"#DC2626",fontFamily:"var(--font-mono)"}}>{toplamAlisKdvsiz.toLocaleString("tr-TR")} ₺</td>
                    <td style={{padding:"10px 12px",textAlign:"right",fontWeight:800,color:"#F97316",fontFamily:"var(--font-mono)"}}>{toplamAlis.toLocaleString("tr-TR")} ₺</td>
                    <td style={{padding:"10px 12px"}}><span style={{fontSize:10,color:"#059669",fontWeight:700}}>{odenmis.toLocaleString("tr-TR")} ₺ ödendi</span></td>

        <div style={{display:"flex",flexDirection:"column",gap:12}}>

              <button onClick={()=>setCikisModal(true)}

                + Kullanım Ekle
              </button>
            )}

          {servisEdit&&cikisModal&&(
            <div style={{background:"#F0FDF4",border:"1.5px solid rgba(5,150,105,0.25)",borderRadius:12,padding:16}}>

              <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:10,marginBottom:10}}>

                  <select value={yeniCikis.parcaAdi} onChange={e=>{const g=girisler.find(g=>g.parcaAdi===e.target.value);setYeniCikis(p=>({...p,parcaAdi:e.target.value,girisId:g?.id||""}));}}

                    <option value="">Parça seçin...</option>
                    {girisler.map(g=><option key={g.id} value={g.parcaAdi}>{g.parcaAdi} (stok: {g.adet})</option>)}

                <div><div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>SİGORTAYA SATIŞ FİYATI (KDV'SİZ) ₺ ✱</div>{inp2(yeniCikis.satirFiyati,v=>setYeniCikis(p=>({...p,satirFiyati:v})),"0","number")}</div>
                <div><div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>KDV %</div>
                  <select value={yeniCikis.kdvOrani} onChange={e=>setYeniCikis(p=>({...p,kdvOrani:e.target.value}))}
                    style={{width:"100%",background:"#fff",border:"1.5px solid var(--border-md)",borderRadius:8,color:"var(--text-1)",padding:"9px 12px",fontSize:12}}>
                    <option value="0">0%</option><option value="10">10%</option><option value="20">20%</option>
                  </select>
                </div>
                <div><div style={{fontSize:10,color:"var(--text-3)",fontWeight:700,marginBottom:4}}>TEKNİSYEN</div>{inp2(yeniCikis.teknisyen,v=>setYeniCikis(p=>({...p,teknisyen:v})),"Teknisyen adı")}</div>
              </div>
              {yeniCikis.satirFiyati&&yeniCikis.girisId&&(()=>{
                const g=girisler.find(g=>g.id===yeniCikis.girisId);
                const satis=parseFloat(yeniCikis.satirFiyati)||0;
                const adet=parseFloat(yeniCikis.adet)||1;
                const kar=satis-((g?.alisKdvsiz||0));
                return(
                  <div style={{padding:"10px 12px",background:"rgba(5,150,105,0.07)",borderRadius:8,fontSize:11,marginBottom:10,display:"flex",gap:20,flexWrap:"wrap"}}>

                    {g&&<span style={{color:"var(--text-2)"}}>Kalem kârı: <strong style={{color:kar>=0?"#059669":"#DC2626",fontFamily:"var(--font-mono)"}}>{kar>=0?"+":""}{(kar*adet).toLocaleString("tr-TR")} ₺</strong></span>}

                    return(
                      <tr key={cx.id} style={{borderBottom:"1px solid var(--border)",background:i%2===0?"#fff":"#FAFBFC"}}>

                        <td style={{padding:"9px 12px",textAlign:"right",fontFamily:"var(--font-mono)",color:"#059669"}}>{cx.toplamKdvli.toLocaleString("tr-TR")} ₺</td>
                        <td style={{padding:"9px 12px",textAlign:"right",fontFamily:"var(--font-mono)",fontWeight:700,color:kar>=0?"#059669":"#DC2626"}}>{kar>=0?"+":""}{kar.toLocaleString("tr-TR")} ₺</td>

                      </tr>
                    );
                  })}
                </tbody>
                <tfoot>
                  <tr style={{borderTop:"2px solid var(--border)",background:"#F8FAFC"}}>

                    <td style={{padding:"10px 12px",textAlign:"right",fontWeight:800,color:"#059669",fontFamily:"var(--font-mono)"}}>{toplamSatisKdvli.toLocaleString("tr-TR")} ₺</td>

                    <td/>
                  </tr>
                </tfoot>
              </table>
            </div>
          )}
        </div>
      )}

      {/* TEDARİKÇİLER */}
      {aktifSekme==="tedarikciler"&&(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {Object.entries(
            girisler.reduce((acc,g)=>{
              if(!acc[g.tedarikci]) acc[g.tedarikci]={ad:g.tedarikci,kalemler:0,toplamAlis:0,odenmis:0,bekleyen:0,faturalar:new Set()};
              acc[g.tedarikci].kalemler++;
              acc[g.tedarikci].toplamAlis += g.alisFiyati*g.adet;
              acc[g.tedarikci].faturalar.add(g.faturaNo);
              if(g.odemeDurumu==="ödendi") acc[g.tedarikci].odenmis += g.alisFiyati*g.adet;
              else acc[g.tedarikci].bekleyen += g.alisFiyati*g.adet;
              return acc;
            },{})
          ).map(([ad,t])=>(
            <div key={ad} style={{background:"#fff",border:"1px solid var(--border)",borderRadius:12,padding:16,boxShadow:"0 1px 3px rgba(15,23,42,0.06)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,flexWrap:"wrap",gap:8}}>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:"var(--text-1)",marginBottom:2}}>🏭 {ad}</div>
                  <div style={{fontSize:11,color:"var(--text-3)"}}>{t.kalemler} kalem · {[...t.faturalar].length} fatura</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:16,fontWeight:800,color:"var(--blue)",fontFamily:"var(--font-mono)"}}>{t.toplamAlis.toLocaleString("tr-TR")} ₺</div>
                  <div style={{fontSize:10,color:"var(--text-3)"}}>Toplam alış (KDV'li)</div>
                </div>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:120,padding:"8px 12px",background:"rgba(5,150,105,0.07)",borderRadius:8,border:"1px solid rgba(5,150,105,0.15)"}}>
                  <div style={{fontSize:9,color:"#059669",fontWeight:700,marginBottom:2}}>ÖDENDİ</div>
                  <div style={{fontSize:13,fontWeight:800,color:"#059669",fontFamily:"var(--font-mono)"}}>{t.odenmis.toLocaleString("tr-TR")} ₺</div>
                </div>
                <div style={{flex:1,minWidth:120,padding:"8px 12px",background:t.bekleyen>0?"rgba(217,119,6,0.07)":"rgba(5,150,105,0.04)",borderRadius:8,border:`1px solid ${t.bekleyen>0?"rgba(217,119,6,0.2)":"rgba(5,150,105,0.1)"}`}}>
                  <div style={{fontSize:9,color:t.bekleyen>0?"#D97706":"var(--text-3)",fontWeight:700,marginBottom:2}}>BEKLEYEN</div>
                  <div style={{fontSize:13,fontWeight:800,color:t.bekleyen>0?"#D97706":"var(--text-3)",fontFamily:"var(--font-mono)"}}>{t.bekleyen.toLocaleString("tr-TR")} ₺</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
