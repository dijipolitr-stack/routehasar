  const [adminNot,setAdminNot]=useState("");
  const [onayLoading,setOnayLoading]=useState(false);
  const [kapaliKatlar,setKapaliKatlar]=useState({});
  useEffect(()=>{const c=()=>setIsMobile(window.innerWidth<768);c();window.addEventListener("resize",c);return()=>window.removeEventListener("resize",c);},[]);

  const servisEdit = rol==="servis" && (onayDurumu==="taslak"||onayDurumu==="reddedildi");
  const adminEdit  = rol==="admin"  && onayDurumu==="bekliyor";
  const KATEGORILER_ISL=["Kaporta","Boya","Parça","İşçilik","Malzeme","Diğer"];

  // Filtre + arama + sıralama
  const filtrelenmis = islemler
    .filter(i=>{
      const aramaUygun = !aramaMetni || i.aciklama.toLowerCase().includes(aramaMetni.toLowerCase()) || i.kategori.toLowerCase().includes(aramaMetni.toLowerCase());
      const katUygun = filtreKat==="tumu" || i.kategori===filtreKat;
      return aramaUygun && katUygun;
    })
    .sort((a,b)=>{
      const [al,yon]=[ siralama.alan, siralama.yon];
      const va = al==="toplam"?a.birimFiyat*a.miktar : a[al];
      const vb = al==="toplam"?b.birimFiyat*b.miktar : b[al];
      return yon==="asc" ? (va>vb?1:-1) : (va<vb?1:-1);
    });

  // Kategori bazlı gruplama
  const gruplar = KATEGORILER_ISL.reduce((acc,k)=>{
    const items=filtrelenmis.filter(i=>i.kategori===k);
    if(items.length>0) acc[k]=items;
    return acc;
  },{});
  if(filtrelenmis.some(i=>!KATEGORILER_ISL.includes(i.kategori))){
    gruplar["Diğer"]=filtrelenmis.filter(i=>!KATEGORILER_ISL.includes(i.kategori));
  }

  // Özetler
  const toplamFatura    = islemler.reduce((s,i)=>s+i.birimFiyat*i.miktar,0);
  const onaylananToplam = islemler.filter(i=>i.durum==="onaylandi").reduce((s,i)=>s+i.birimFiyat*i.miktar,0);
  const sigortaOdeme    = parseFloat((muhasebe?.sigortaOdeme||"0").replace(/[^\d]/g,""))||0;
  const fark            = onaylananToplam - sigortaOdeme;
  const bekleyenKalem   = islemler.filter(i=>i.durum==="bekliyor").length;

  // İşlem fonksiyonları
  const islemGuncelle=(id,alan,val)=>setIslemler(p=>p.map(i=>i.id===id?{...i,[alan]:alan==="miktar"||alan==="birimFiyat"?parseFloat(val)||0:val}:i));
  const islemSil=(id)=>setIslemler(p=>p.filter(i=>i.id!==id));
  const islemEkle=()=>{
    if(!yeniForm.aciklama.trim()||!yeniForm.birimFiyat)return;
    setIslemler(p=>[...p,{id:Date.now(),kategori:yeniForm.kategori,aciklama:yeniForm.aciklama,birim:yeniForm.birim,miktar:parseFloat(yeniForm.miktar)||1,birimFiyat:parseFloat(yeniForm.birimFiyat)||0,durum:"bekliyor"}]);
    setYeniForm(p=>({...p,aciklama:"",birimFiyat:""}));
  };

  // Toplu import — her satır: Kategori | Açıklama | Birim | Miktar | Birim Fiyat
  const topluEkle=()=>{
    setTopluHata("");
    const satirlar=topluMetin.trim().split("\n").filter(s=>s.trim());
    const yeniIslemler=[];
    const hatalar=[];
    satirlar.forEach((satir,idx)=>{
      const parcalar=satir.split(/[\t|;]/).map(p=>p.trim());
      if(parcalar.length<3){hatalar.push(`Satır ${idx+1}: En az 3 sütun gerekli (Açıklama|Birim Fiyat|Miktar)`);return;}
      const [aciklama,birimFiyatStr,miktarStr,kategori,birim]=parcalar;
      const birimFiyat=parseFloat(birimFiyatStr.replace(/[^\d.,]/g,"").replace(",","."));
      const miktar=parseFloat(miktarStr||"1")||1;
      if(!birimFiyat){hatalar.push(`Satır ${idx+1}: Geçersiz birim fiyat "${birimFiyatStr}"`);return;}
      yeniIslemler.push({id:Date.now()+idx,kategori:KATEGORILER_ISL.includes(kategori)?kategori:"Diğer",aciklama,birim:birim||"Adet",miktar,birimFiyat,durum:"bekliyor"});
    });
    if(hatalar.length>0){setTopluHata(hatalar.join("\n"));return;}
    setIslemler(p=>[...p,...yeniIslemler]);
    setTopluMetin("");setTopluAcik(false);
  };

  const onayaGonder=()=>{setOnayLoading(true);setTimeout(()=>{setOnayDurumu("bekliyor");setOnayLoading(false);},900);};
  const adminOnayla=()=>{setOnayLoading(true);setTimeout(()=>{setIslemler(p=>p.map(i=>({...i,durum:"onaylandi"})));setMuhasebe(p=>({...p,onaylananTutar:`${toplamFatura.toLocaleString("tr-TR")} ₺`,...(adminNot?{notlar:adminNot}:{})}));setOnayDurumu("onaylandi");setOnayLoading(false);},900);};
  const adminReddet=()=>{setOnayLoading(true);setTimeout(()=>{setMuhasebe(p=>({...p,...(adminNot?{notlar:adminNot}:{})}));setOnayDurumu("reddedildi");setOnayLoading(false);},900);};
  const katToggle=(k)=>setKapaliKatlar(p=>({...p,[k]:!p[k]}));
  const siralamaDegistir=(alan)=>setSiralama(p=>({alan,yon:p.alan===alan&&p.yon==="asc"?"desc":"asc"}));

  const DURUM_BADGE={
    taslak:    {l:"Taslak",          c:"var(--text-3)",bg:"rgba(100,116,139,0.12)"},
    bekliyor:  {l:"⏳ Onay Bekliyor", c:"#F59E0B",bg:"rgba(245,158,11,0.12)"},
    onaylandi: {l:"✓ Onaylandı",     c:"#10B981",bg:"rgba(16,185,129,0.12)"},
    reddedildi:{l:"✕ Reddedildi",    c:"#EF4444",bg:"rgba(239,68,68,0.12)"},
  };
  const badge=DURUM_BADGE[onayDurumu]||DURUM_BADGE.taslak;
  const selStyle={background:"var(--border)",border:"1px solid var(--border-hi)",borderRadius:7,color:"var(--text-1)",padding:"7px 10px",fontSize:12};
  const thStyle={textAlign:"left",padding:"8px 10px",color:"var(--text-2)",fontWeight:600,fontSize:10,whiteSpace:"nowrap",cursor:"pointer",userSelect:"none"};
  const SiraOk=({alan})=>siralama.alan===alan?<span style={{marginLeft:3,color:"#818CF8"}}>{siralama.yon==="asc"?"▲":"▼"}</span>:null;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>

      {/* Başlık + export */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontWeight:700,fontSize:14}}>💰 Muhasebe</span>
          <span style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:5,background:badge.bg,color:badge.c,border:`1px solid ${badge.c}30`}}>{badge.l}</span>
          <span style={{fontSize:10,color:"var(--text-2)"}}>{islemler.length} kalem</span>
        </div>
        {rol==="admin"&&exportCSV&&(
          <div style={{display:"flex",gap:6}}>
            <button onClick={exportCSV} style={{background:"rgba(16,185,129,0.12)",border:"1px solid rgba(16,185,129,0.3)",color:"#10B981",borderRadius:7,padding:"5px 12px",fontSize:11,fontWeight:700}}>📊 Excel</button>
            <button onClick={exportPDF} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.25)",color:"#EF4444",borderRadius:7,padding:"5px 12px",fontSize:11,fontWeight:700}}>🖨️ PDF</button>
          </div>
        )}
      </div>

      {/* Red uyarısı */}
      {rol==="servis"&&onayDurumu==="reddedildi"&&(
        <div style={{padding:"12px 14px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:10,fontSize:12,color:"#EF4444",lineHeight:1.6}}>
          ✕ <strong>Reddedildi.</strong> Kalemleri güncelleyip tekrar gönderebilirsiniz.
          {muhasebe?.notlar&&<div style={{marginTop:6,color:"var(--text-2)"}}>Admin notu: {muhasebe.notlar}</div>}
        </div>
      )}

      {/* Özet kartları */}
      <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"repeat(4,1fr)",gap:10}}>
        {[
          {l:"Toplam Fatura",   v:`${toplamFatura.toLocaleString("tr-TR")} ₺`,                                    c:"#EF4444",sub:`${islemler.length} kalem`},
          {l:"Onaylanan",       v:onaylananToplam>0?`${onaylananToplam.toLocaleString("tr-TR")} ₺`:"Bekliyor",    c:"#3B82F6", sub:`${islemler.filter(i=>i.durum==="onaylandi").length} kalem`},
          {l:"Sigorta Ödemesi", v:muhasebe?.sigortaOdeme||"Bekleniyor",                                            c:muhasebe?.sigortaOdeme?"#10B981":"var(--text-3)",sub:"Alınan ödeme"},
          {l:"Net Fark",        v:muhasebe?.sigortaOdeme&&onaylananToplam>0?`${fark>=0?"+":""}${fark.toLocaleString("tr-TR")} ₺`:"—",c:fark>=0?"#10B981":"#EF4444",sub:fark>=0?"Fazla":"Eksik"},
        ].map(k=>(
          <div key={k.l} style={{background:"var(--surface-2)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px"}}>
            <div style={{fontSize:9,color:"var(--text-2)",fontWeight:700,marginBottom:5}}>{k.l.toUpperCase()}</div>
            <div style={{fontSize:isMobile?14:18,fontWeight:800,color:k.c,marginBottom:2}}>{k.v}</div>
            <div style={{fontSize:9,color:"rgba(15,23,42,0.06)"}}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* Araçlar: Arama + Filtre + Toplu Ekle */}
      <div style={{background:"var(--surface-2)",border:"1px solid var(--border)",borderRadius:12,overflow:"hidden"}}>
        {/* Toolbar */}
        <div style={{padding:"12px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          {/* Arama */}
          <div style={{position:"relative",flex:1,minWidth:160}}>
            <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:13,pointerEvents:"none",color:"var(--text-2)"}}>🔍</span>
            <input value={aramaMetni} onChange={e=>setAramaMetni(e.target.value)} placeholder="Kalem ara..." style={{width:"100%",background:"var(--border)",border:"1px solid var(--border-md)",borderRadius:8,color:"var(--text-1)",padding:"7px 10px 7px 32px",fontSize:12}}/>
            {aramaMetni&&<button onClick={()=>setAramaMetni("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"var(--text-2)",fontSize:14}}>×</button>}
          </div>
          {/* Kategori filtre */}
          <select value={filtreKat} onChange={e=>setFiltreKat(e.target.value)} style={{...selStyle,padding:"7px 10px",fontSize:11}}>
            <option value="tumu">Tüm Kategoriler ({islemler.length})</option>
            {KATEGORILER_ISL.map(k=>{const n=islemler.filter(i=>i.kategori===k).length;return n>0&&<option key={k} value={k}>{k} ({n})</option>;})}
          </select>
          {/* Servis butonları */}
          {servisEdit&&(
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{setYeniAcik(a=>!a);setTopluAcik(false);}} style={{background:yeniAcik?"rgba(139,92,246,0.2)":"rgba(139,92,246,0.1)",border:"1px solid rgba(139,92,246,0.3)",color:"#A78BFA",borderRadius:7,padding:"6px 12px",fontSize:11,fontWeight:700}}>+ Kalem</button>
              <button onClick={()=>{setTopluAcik(a=>!a);setYeniAcik(false);}} style={{background:topluAcik?"rgba(59,130,246,0.2)":"rgba(59,130,246,0.08)",border:"1px solid rgba(59,130,246,0.3)",color:"#60A5FA",borderRadius:7,padding:"6px 12px",fontSize:11,fontWeight:700}}>📋 Toplu Ekle</button>
            </div>
          )}
          {!servisEdit&&!adminEdit&&<div style={{fontSize:10,color:"var(--text-2)",padding:"4px 9px",background:"var(--surface-3)",borderRadius:6}}>🔒 Salt okunur</div>}
          <div style={{fontSize:11,color:"var(--text-2)",marginLeft:"auto",flexShrink:0}}>{filtrelenmis.length} / {islemler.length} kalem</div>
        </div>

        {/* Tek kalem ekleme formu */}
        {servisEdit&&yeniAcik&&(
          <div style={{padding:"12px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",background:"rgba(139,92,246,0.04)"}}>
            <div style={{fontSize:11,color:"#A78BFA",fontWeight:700,marginBottom:10}}>YENİ KALEM</div>
            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"2fr 3fr 1fr 1fr 1fr auto",gap:8,alignItems:"end"}}>
              <div>
                <div style={{fontSize:10,color:"var(--text-2)",fontWeight:600,marginBottom:4}}>KATEGORİ</div>
                <select value={yeniForm.kategori} onChange={e=>setYeniForm(p=>({...p,kategori:e.target.value}))} style={selStyle}>
                  {KATEGORILER_ISL.map(k=><option key={k} value={k}>{k}</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:10,color:"var(--text-2)",fontWeight:600,marginBottom:4}}>AÇIKLAMA</div>
                <input value={yeniForm.aciklama} onChange={e=>setYeniForm(p=>({...p,aciklama:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&islemEkle()} placeholder="Yapılan iş..." style={{...selStyle,width:"100%"}}/>
              </div>
              <div>
                <div style={{fontSize:10,color:"var(--text-2)",fontWeight:600,marginBottom:4}}>BİRİM</div>
                <input value={yeniForm.birim} onChange={e=>setYeniForm(p=>({...p,birim:e.target.value}))} placeholder="Adet" style={{...selStyle,width:"100%"}}/>
              </div>
              <div>
                <div style={{fontSize:10,color:"var(--text-2)",fontWeight:600,marginBottom:4}}>MİKTAR</div>
                <input type="number" value={yeniForm.miktar} onChange={e=>setYeniForm(p=>({...p,miktar:e.target.value}))} style={{...selStyle,width:"100%"}}/>
              </div>
              <div>
                <div style={{fontSize:10,color:"var(--text-2)",fontWeight:600,marginBottom:4}}>BİRİM FİYAT ₺</div>
                <input type="number" value={yeniForm.birimFiyat} onChange={e=>setYeniForm(p=>({...p,birimFiyat:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&islemEkle()} placeholder="0" style={{...selStyle,width:"100%"}}/>
              </div>
              <button onClick={islemEkle} style={{background:"#8B5CF6",border:"none",color:"#fff",borderRadius:7,padding:"8px 14px",fontSize:13,fontWeight:800,height:36}}>+</button>
            </div>
            <div style={{fontSize:10,color:"var(--text-2)",marginTop:8}}>💡 Enter ile hızlıca ekleyebilirsiniz</div>
          </div>
        )}

        {/* Toplu ekleme */}
        {servisEdit&&topluAcik&&(
          <div style={{padding:"12px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",background:"rgba(59,130,246,0.04)"}}>
            <div style={{fontSize:11,color:"#60A5FA",fontWeight:700,marginBottom:6}}>📋 TOPLU KALEM EKLEME</div>
            <div style={{fontSize:11,color:"var(--text-2)",marginBottom:8,lineHeight:1.6}}>
              Her satıra bir kalem girin. Sütunları <strong style={{color:"var(--text-2)"}}>Tab</strong>, <strong style={{color:"var(--text-2)"}}>|</strong> veya <strong style={{color:"var(--text-2)"}}>;</strong> ile ayırın:<br/>
              <span style={{fontFamily:"var(--font-mono)",color:"#818CF8"}}>Açıklama | Birim Fiyat | Miktar | Kategori | Birim</span>
            </div>
            <div style={{padding:"8px 12px",background:"var(--surface-3)",borderRadius:7,marginBottom:8,fontSize:10,color:"var(--text-2)",fontFamily:"var(--font-mono)",lineHeight:1.8}}>
              Sağ ön far komple | 8500 | 1 | Parça | Adet<br/>
              Motor kapağı boya | 2200 | 1 | Boya | Adet<br/>
              Söküm işçiliği | 450 | 3 | İşçilik | Saat
            </div>
            <textarea value={topluMetin} onChange={e=>setTopluMetin(e.target.value)} rows={8} placeholder={"Açıklama | Birim Fiyat | Miktar | Kategori | Birim"} style={{width:"100%",background:"var(--border)",border:"1px solid var(--border-md)",borderRadius:8,color:"var(--text-1)",padding:"10px 12px",fontSize:12,resize:"vertical",lineHeight:1.8,fontFamily:"var(--font-mono)"}}/>
            {topluHata&&<div style={{marginTop:6,padding:"8px 10px",background:"rgba(239,68,68,0.08)",borderRadius:7,fontSize:11,color:"#EF4444",fontFamily:"var(--font-mono)",whiteSpace:"pre-wrap"}}>{topluHata}</div>}
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button onClick={topluEkle} disabled={!topluMetin.trim()} style={{background:topluMetin.trim()?"#3B82F6":"rgba(59,130,246,0.3)",border:"none",color:"#fff",borderRadius:7,padding:"9px 20px",fontSize:12,fontWeight:700}}>✓ {topluMetin.trim().split("\n").filter(s=>s.trim()).length} Kalem Ekle</button>
              <button onClick={()=>{setTopluAcik(false);setTopluMetin("");setTopluHata("");}} style={{background:"rgba(15,23,42,0.05)",border:"1px solid var(--border-md)",color:"var(--text-2)",borderRadius:7,padding:"9px 14px",fontSize:12}}>İptal</button>
            </div>
          </div>
        )}

        {/* Tablo — Kategoriye göre gruplu */}
        {filtrelenmis.length===0?(
          <div style={{padding:"32px 16px",textAlign:"center",color:"rgba(15,23,42,0.06)"}}>
            <div style={{fontSize:32,marginBottom:8}}>🔍</div>
            <div style={{fontSize:13,fontWeight:600}}>{aramaMetni?"Arama sonucu yok":"Henüz kalem girilmedi"}</div>
          </div>
        ):(
          <div>
            {Object.entries(gruplar).map(([kat,items])=>{
              const renk=ISLEM_KAT_RENK[kat]||"var(--text-3)";
              const katToplam=items.reduce((s,i)=>s+i.birimFiyat*i.miktar,0);
              const katOnaylanan=items.filter(i=>i.durum==="onaylandi").reduce((s,i)=>s+i.birimFiyat*i.miktar,0);
              const kapali=kapaliKatlar[kat];
              return(
                <div key={kat} style={{borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
                  {/* Kategori başlığı */}
                  <div onClick={()=>katToggle(kat)} style={{padding:"10px 14px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",background:kapali?"transparent":"rgba(255,255,255,0.01)"}}>
                    <div style={{width:10,height:10,borderRadius:2,background:renk,flexShrink:0}}/>
                    <span style={{fontWeight:700,fontSize:12,color:renk,flex:1}}>{kat}</span>
                    <span style={{fontSize:11,color:"var(--text-2)"}}>{items.length} kalem</span>
                    <span style={{fontSize:12,fontWeight:700,color:"var(--text-1)",fontFamily:"var(--font-mono)"}}>{katToplam.toLocaleString("tr-TR")} ₺</span>
                    {katOnaylanan>0&&<span style={{fontSize:10,color:"#10B981",fontFamily:"var(--font-mono)"}}>✓{katOnaylanan.toLocaleString("tr-TR")} ₺</span>}
                    <span style={{color:"var(--text-2)",fontSize:12,transform:kapali?"none":"rotate(180deg)",display:"inline-block",transition:"transform .2s"}}>▾</span>
                  </div>

                  {/* Kalemler tablosu */}
                  {!kapali&&(
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:isMobile?11:12}}>
                        <thead>
                          <tr style={{background:"rgba(15,23,42,0.02)",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
                            <th style={thStyle} onClick={()=>siralamaDegistir("aciklama")}>Açıklama<SiraOk alan="aciklama"/></th>
                            <th style={{...thStyle,width:70}} onClick={()=>siralamaDegistir("birim")}>Birim<SiraOk alan="birim"/></th>
                            <th style={{...thStyle,width:70,textAlign:"right"}} onClick={()=>siralamaDegistir("miktar")}>Miktar<SiraOk alan="miktar"/></th>
                            <th style={{...thStyle,width:100,textAlign:"right"}} onClick={()=>siralamaDegistir("birimFiyat")}>Birim Fiyat<SiraOk alan="birimFiyat"/></th>
                            <th style={{...thStyle,width:100,textAlign:"right"}} onClick={()=>siralamaDegistir("toplam")}>Toplam<SiraOk alan="toplam"/></th>
                            <th style={{...thStyle,width:80}}>Durum</th>
                            {(servisEdit||adminEdit)&&<th style={{width:64}}/>}
                          </tr>
                        </thead>
                        <tbody>
                          {items.map((isl,idx)=>{
                            const toplam=isl.birimFiyat*isl.miktar;
                            const editing=duzenleId===isl.id&&servisEdit;
                            return(
                              <tr key={isl.id} style={{borderBottom:"1px solid rgba(255,255,255,0.03)",background:idx%2===0?"transparent":"rgba(255,255,255,0.01)"}}>
                                <td style={{padding:"8px 10px",color:"var(--text-1)"}}>
                                  {editing?<input value={isl.aciklama} onChange={e=>islemGuncelle(isl.id,"aciklama",e.target.value)} style={{...selStyle,padding:"4px 8px",width:"100%"}}/>:isl.aciklama}
                                </td>
                                <td style={{padding:"8px 10px",color:"var(--text-2)"}}>{isl.birim}</td>
                                <td style={{padding:"8px 10px",color:"var(--text-2)",textAlign:"right"}}>
                                  {editing?<input type="number" value={isl.miktar} onChange={e=>islemGuncelle(isl.id,"miktar",e.target.value)} style={{...selStyle,padding:"4px 6px",width:60,textAlign:"right"}}/>:isl.miktar}
                                </td>
                                <td style={{padding:"8px 10px",color:"var(--text-2)",textAlign:"right",fontFamily:"var(--font-mono)"}}>
                                  {editing?<input type="number" value={isl.birimFiyat} onChange={e=>islemGuncelle(isl.id,"birimFiyat",e.target.value)} style={{...selStyle,padding:"4px 6px",width:80,textAlign:"right"}}/>:`${isl.birimFiyat.toLocaleString("tr-TR")} ₺`}
                                </td>

      localStorage.setItem("ht_token", data.token);
      onGiris({rol:"admin", ...data.kullanici});

function ServisGiris({onGiris,onGeri}){
  const [secilen,setSecilen]=useState(null);
  const [sifre,setSifre]=useState("");
  const [hata,setHata]=useState(false);
  const [loading,setLoading]=useState(false);
  const giris=()=>{
    if(!secilen){setHata(true);return;}
    setLoading(true);setHata(false);
    setTimeout(()=>{
      setLoading(false);
      const srv=SERVISLER.find(s=>s.id===secilen);
      if(srv&&sifre===srv.sifre)onGiris({rol:"servis",servis:srv});
      else{setHata(true);setSifre("");}
    },800);
  };
  return(
    <GirisKabuk ikon="🔧" baslik="Servis Girişi" renk="#8B5CF6" aciklama="Servisinizi seçin ve şifrenizle giriş yapın" onGeri={onGeri} demo="Şifreler: servis1 / servis2 / servis3">
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
        <div style={{fontSize:10,color:"var(--text-2)",fontWeight:700,letterSpacing:".6px",marginBottom:4}}>SERVİS SEÇİN</div>
        {SERVISLER.map(s=>(
          <button key={s.id} onClick={()=>{setSecilen(s.id);setSifre("");setHata(false);}}
            style={{background:secilen===s.id?"var(--violet-dim)":"var(--surface-2)",border:`1px solid ${secilen===s.id?"rgba(139,92,246,0.4)":"var(--border)"}`,borderRadius:10,padding:"11px 14px",textAlign:"left",display:"flex",alignItems:"center",gap:10,transition:"all .15s"}}>
            <div style={{width:34,height:34,borderRadius:9,background:secilen===s.id?"rgba(139,92,246,0.2)":"var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🔧</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:12,color:secilen===s.id?"#C4B5FD":"var(--text-1)"}}>{s.ad}</div>
              <div style={{fontSize:10,color:"var(--text-2)",marginTop:1}}>{s.adres}</div>
            </div>
            {secilen===s.id&&<div style={{width:18,height:18,borderRadius:"50%",background:"#8B5CF6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",flexShrink:0}}>✓</div>}
          </button>
        ))}
      </div>
      {secilen&&(
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,color:"var(--text-2)",fontWeight:700,letterSpacing:".6px",marginBottom:6}}>ŞİFRE</div>
          <input type="password" value={sifre} onChange={e=>setSifre(e.target.value)} onKeyDown={e=>e.key==="Enter"&&giris()} placeholder="Servis şifrenizi girin" className={`inp${hata?" error":""}`}/>
          {hata&&<div style={{fontSize:11,color:"var(--red)",marginTop:5}}>⚠ Şifre hatalı.</div>}
        </div>
      )}
      <button onClick={giris} disabled={loading||!secilen} className="btn-primary" style={{width:"100%",padding:13,fontSize:13,borderRadius:10,background:secilen?"linear-gradient(135deg,#7C3AED,#6D28D9)":"rgba(139,92,246,0.3)",boxShadow:secilen?"0 2px 8px rgba(109,40,217,0.35)":"none"}}>
        {loading?<span style={{animation:"pulse .8s infinite"}}>Giriş yapılıyor...</span>:"Giriş Yap →"}
      </button>
    </GirisKabuk>
  );
}

                <Card key={k.l} style={{textAlign:"center",padding:12}}><div style={{fontSize:20,fontWeight:800,color:k.c}}>{k.v}</div><div style={{fontSize:10,color:"var(--text-2)",marginTop:2}}>{k.l}</div></Card>

            <div onClick={()=>belgeRef2.current?.click()} style={{border:"2px dashed rgba(139,92,246,0.3)",borderRadius:12,padding:20,textAlign:"center",cursor:"pointer",background:"rgba(139,92,246,0.03)"}}>
              <input ref={belgeRef2} type="file" multiple accept=".pdf,.jpg,.jpeg,.png,.docx" onChange={e=>handleBelge2(e.target.files)} style={{display:"none"}}/>

            {servisEvrak.map(e=>(
              <div key={e.id} style={{background:"var(--surface-2)",border:`1px solid ${e.durum==="yuklendi"?"rgba(16,185,129,0.2)":"rgba(245,158,11,0.2)"}`,borderRadius:10,padding:"13px 14px",display:"flex",gap:12,alignItems:"center"}}>
                <div style={{width:36,height:36,borderRadius:9,flexShrink:0,background:e.durum==="yuklendi"?"rgba(16,185,129,0.15)":"rgba(245,158,11,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
                  {e.durum==="yuklendi"?"✅":"📄"}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>{e.ad}</div>
                  <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                    <Chip renk={e.durum==="yuklendi"?"#10B981":"#F59E0B"} sm>{e.durum==="yuklendi"?"✓ Yüklendi":"⏳ Bekliyor"}</Chip>
                    {e.tarih&&<span style={{fontSize:10,color:"var(--text-2)",fontFamily:"var(--font-mono)"}}>{e.tarih}</span>}

// ─── SERVİS DETAY (Admin Görünümü) ────────────────────────────────────────
function ServisDetayAdmin({servisId, onGeri}){
  const [acikDosya,setAcikDosya]=useState(null);
  const [isMobile,setIsMobile]=useState(false);
  useEffect(()=>{const c=()=>setIsMobile(window.innerWidth<768);c();window.addEventListener("resize",c);return()=>window.removeEventListener("resize",c);},[]);

  const servis=SERVISLER.find(s=>s.id===servisId);
  const dosyalar=DEMO_DOSYALAR.filter(d=>d.atananServis===servisId);
  const P=isMobile?12:24;

  const toplamFatura=dosyalar.reduce((sum,d)=>{
    const isl=TUMU_ISLEMLER[d.id];
    return sum+(isl?isl.kalemler.reduce((s,k)=>s+k.birimFiyat*k.miktar,0):0);
  },0);
  const onaylananToplam=dosyalar.reduce((sum,d)=>{
    const isl=TUMU_ISLEMLER[d.id];
    return sum+(isl?isl.kalemler.filter(k=>k.durum==="onaylandi").reduce((s,k)=>s+k.birimFiyat*k.miktar,0):0);
  },0);
  const bekleyenOnay=dosyalar.filter(d=>TUMU_ISLEMLER[d.id]?.onayDurumu==="bekliyor").length;

  const DURUM_BADGE={
    taslak:    {l:"Taslak",         c:"var(--text-3)",bg:"rgba(100,116,139,0.12)"},
    bekliyor:  {l:"⏳ Onay Bekliyor",c:"#F59E0B",bg:"rgba(245,158,11,0.12)"},
    onaylandi: {l:"✓ Onaylandı",    c:"#10B981",bg:"rgba(16,185,129,0.12)"},
    reddedildi:{l:"✕ Reddedildi",   c:"#EF4444",bg:"rgba(239,68,68,0.12)"},
  };

  if(!servis) return null;

  return(
    <div style={{fontFamily:"'Inter',sans-serif",background:"var(--bg)",minHeight:"100vh",color:"var(--text-1)"}}>
      {/* Header */}
      <div style={{background:"var(--surface-1)",borderBottom:"1px solid rgba(255,255,255,0.07)",padding:`0 ${P}px`,height:56,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={onGeri} style={{background:"var(--border)",border:"1px solid var(--border-md)",color:"var(--text-2)",borderRadius:7,padding:"5px 12px",fontSize:11,fontWeight:600}}>← Geri</button>
          <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#5B21B6,#8B5CF6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🔧</div>
          <div>
            <div style={{fontWeight:800,fontSize:14}}>{servis.ad}</div>
            <div style={{fontSize:10,color:"var(--text-2)"}}>{servis.adres}</div>
          </div>
        </div>
        {bekleyenOnay>0&&(
          <div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(245,158,11,0.12)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:8,padding:"5px 12px"}}>
            <span style={{fontSize:16}}>⏳</span>
            <span style={{fontSize:12,fontWeight:700,color:"#F59E0B"}}>{bekleyenOnay} Onay Bekliyor</span>
          </div>
        )}
      </div>

      <div style={{maxWidth:860,margin:"0 auto",padding:`${isMobile?16:32}px ${P}px`}}>

        {/* Servis özet kartları */}
        <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"repeat(4,1fr)",gap:10,marginBottom:24}}>
          {[
            {l:"Toplam Araç",     v:dosyalar.length,                                   c:"#8B5CF6"},
            {l:"Bekleyen Onay",   v:bekleyenOnay,                                       c:bekleyenOnay>0?"#F59E0B":"var(--text-3)"},
            {l:"Toplam Fatura",   v:`${toplamFatura.toLocaleString("tr-TR")} ₺`,        c:"#EF4444"},
            {l:"Onaylanan Tutar", v:`${onaylananToplam.toLocaleString("tr-TR")} ₺`,     c:"#10B981"},
          ].map(k=>(
            <div key={k.l} style={{background:"var(--surface-2)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px"}}>
              <div style={{fontSize:9,color:"var(--text-2)",fontWeight:700,marginBottom:5}}>{k.l.toUpperCase()}</div>
              <div style={{fontSize:isMobile?16:22,fontWeight:800,color:k.c}}>{k.v}</div>
            </div>
          ))}
        </div>

        {/* Her dosya için kart */}
        {dosyalar.length===0?(
          <div style={{textAlign:"center",padding:"40px 20px",color:"rgba(15,23,42,0.06)"}}>
            <div style={{fontSize:44,marginBottom:12}}>🚗</div>
            <div style={{fontWeight:700,fontSize:14}}>Bu servise atanmış araç yok</div>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {dosyalar.map(d=>{
              const islVeri=TUMU_ISLEMLER[d.id]||{onayDurumu:"taslak",kalemler:[]};
              const badge=DURUM_BADGE[islVeri.onayDurumu]||DURUM_BADGE.taslak;
              const toplamD=islVeri.kalemler.reduce((s,k)=>s+k.birimFiyat*k.miktar,0);
              const onaylananD=islVeri.kalemler.filter(k=>k.durum==="onaylandi").reduce((s,k)=>s+k.birimFiyat*k.miktar,0);
              const acik=acikDosya===d.id;
              const dc=d.durum==="Aktif"?"#4F46E5":"#10B981";

              return(
                <div key={d.id} style={{background:"var(--surface-2)",border:`1px solid ${acik?"rgba(139,92,246,0.35)":"var(--border)"}`,borderRadius:14,overflow:"hidden"}}>
                  {/* Dosya başlık satırı */}
                  <div style={{padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}
                    onClick={()=>setAcikDosya(acik?null:d.id)}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:6}}>
                        <div style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:700,color:"#818CF8",background:"rgba(79,70,229,0.12)",padding:"2px 8px",borderRadius:5}}>{d.id}</div>
                        <div style={{fontWeight:700,fontSize:14}}>{d.plaka}</div>
                        <Chip renk={dc} sm>{d.durum}</Chip>
                        <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:5,background:badge.bg,color:badge.c,border:`1px solid ${badge.c}25`}}>{badge.l}</span>
                      </div>
                      <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                        <span style={{fontSize:12,color:"var(--text-2)"}}>🚗 {d.arac}</span>
                        <span style={{fontSize:12,color:"var(--text-2)"}}>👤 {d.sahip}</span>
                        {toplamD>0&&<span style={{fontSize:12,color:"#EF4444",fontWeight:600}}>💰 {toplamD.toLocaleString("tr-TR")} ₺</span>}
                        {onaylananD>0&&<span style={{fontSize:12,color:"#10B981",fontWeight:600}}>✓ {onaylananD.toLocaleString("tr-TR")} ₺</span>}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
                      {islVeri.onayDurumu==="bekliyor"&&(

// ─── YENİ DOSYA SİHİRBAZI ─────────────────────────────────────────────────
function YeniDosyaWizard({onKapat,onKaydet}){
  const [adim,setAdim]=useState(1);
  const [ruhsatImg,setRuhsatImg]=useState(null);
  const [tarama,setTarama]=useState(false);
  const [taramaOk,setTaramaOk]=useState(false);
  const [taramaHata,setTaramaHata]=useState(false);
  const [belgeler,setBelgeler]=useState([]);
  const [fotograflar,setFotograflar]=useState([]);
  const [kayitOk,setKayitOk]=useState(false);
  const [isMobile,setIsMobile]=useState(false);
  const ruhsatRef=useRef();const belgeRef=useRef();const fotoRef=useRef();
  useEffect(()=>{const c=()=>setIsMobile(window.innerWidth<768);c();window.addEventListener("resize",c);return()=>window.removeEventListener("resize",c);},[]);
  const [form,setForm]=useState({plaka:"",saseNo:"",motorNo:"",marka:"",model:"",yil:"",ruhsatSeriNo:"",renk:"",sahipAd:"",tc:"",telefon:"",email:"",acente:"",sigortaSirketi:"",bransi:"",muallakHasar:"",policeNo:"",hasarNo:"",teminat:"",muafiyet:"",kazaTarihi:"",kazaAciklama:""});
  const sf=(k,v)=>setForm(p=>({...p,[k]:v}));
  const ruhsatTara=async()=>{
    if(!ruhsatImg)return;
    setTarama(true);setTaramaHata(false);setTaramaOk(false);
    try{
      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:ruhsatImg.split(",")[1]}},{type:"text",text:'Bu bir Türk araç tescil belgesi veya ruhsatıdır. Görseldeki bilgileri bu JSON formatında döndür, bulunamayan alanlar için boş string kullan, sadece JSON döndür: {"plaka":"","saseNo":"","motorNo":"","marka":"","model":"","yil":"","ruhsatSeriNo":"","sahipAd":"","sahipSoyad":"","tcVeyaVergiNo":"","renk":""}'}]}]})});
      const data=await resp.json();
      const text=data.content?.find(b=>b.type==="text")?.text||"";
      const clean=text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      const tamAd=[parsed.sahipAd||"",parsed.sahipSoyad||""].filter(Boolean).join(" ");
      setForm(p=>({...p,plaka:parsed.plaka||p.plaka,saseNo:parsed.saseNo||p.saseNo,motorNo:parsed.motorNo||p.motorNo,marka:parsed.marka||p.marka,model:parsed.model||p.model,yil:parsed.yil||p.yil,ruhsatSeriNo:parsed.ruhsatSeriNo||p.ruhsatSeriNo,sahipAd:tamAd||p.sahipAd,tc:parsed.tcVeyaVergiNo||p.tc,renk:parsed.renk||p.renk}));
      setTaramaOk(true);
    }catch(e){setTaramaHata(true);}
    finally{setTarama(false);}
  };
  const handleRuhsat=(files)=>{const f=files[0];if(!f)return;const r=new FileReader();r.onload=e=>{setRuhsatImg(e.target.result);setTaramaOk(false);};r.readAsDataURL(f);};
  const handleBelge=(files)=>Array.from(files).forEach(f=>{const r=new FileReader();r.onload=e=>setBelgeler(p=>[...p,{id:Date.now()+Math.random(),ad:f.name,url:e.target.result,boyut:(f.size/1048576).toFixed(1)+" MB"}]);r.readAsDataURL(f);});
  const handleFoto=(files)=>Array.from(files).filter(f=>f.type.startsWith("image/")).forEach(f=>{const r=new FileReader();r.onload=e=>setFotograflar(p=>[...p,{id:Date.now()+Math.random(),url:e.target.result,etiket:f.name.replace(/\.[^.]+$/,""),kategori:"kaza",tarih:new Date().toLocaleDateString("tr-TR"),yukleyen:"Admin",boyut:(f.size/1048576).toFixed(1)+" MB"}]);r.readAsDataURL(f);});
  const kaydet=()=>{setKayitOk(true);setTimeout(()=>onKaydet({form,belgeler,fotograflar}),1500);};
  const ADIMLAR=[{n:1,l:"Ruhsat",i:"📄"},{n:2,l:"Araç & Müşteri",i:"🚗"},{n:3,l:"Sigorta & Kaza",i:"🏦"},{n:4,l:"Belgeler",i:"📎"},{n:5,l:"Özet",i:"✅"}];
  const inp=(k,p,mono)=><input type="text" value={form[k]} onChange={e=>sf(k,e.target.value)} placeholder={p} style={{width:"100%",background:"rgba(15,23,42,0.05)",border:"1px solid var(--border-md)",borderRadius:9,color:"var(--text-1)",padding:"10px 13px",fontSize:13,fontFamily:mono?"var(--font-mono)":"inherit"}}/>;
  const lbl=(t,required)=><div style={{fontSize:11,color:required?"#F59E0B":"var(--text-3)",fontWeight:600,marginBottom:5,marginTop:10,display:"flex",alignItems:"center",gap:5}}>{t}{required&&<span style={{fontSize:9,color:"#EF4444"}}>✱ Zorunlu</span>}</div>;
  const g2={display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:"0 14px"};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:isMobile?0:24,overflowY:"auto"}}>
      <div style={{background:"var(--bg)",border:"1px solid var(--border-md)",borderRadius:isMobile?0:16,width:"100%",maxWidth:680,minHeight:isMobile?"100vh":"auto",display:"flex",flexDirection:"column",animation:"popIn .25s ease"}}>
        <div style={{background:"var(--surface-1)",borderBottom:"1px solid rgba(255,255,255,0.07)",borderRadius:isMobile?"0":"16px 16px 0 0",padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,borderRadius:8,background:"linear-gradient(135deg,#1D4ED8,#2563EB)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>📁</div>
            <div><div style={{fontWeight:800,fontSize:15}}>Yeni Hasar Dosyası</div><div style={{fontSize:11,color:"var(--text-2)"}}>Adım {adim} / 5</div></div>
          </div>
          <button onClick={onKapat} style={{background:"var(--border)",border:"1px solid var(--border-md)",color:"var(--text-2)",borderRadius:"50%",width:32,height:32,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>

  const smsGonder=()=>{setSmsGon(true);setTimeout(()=>{setSmsGon(false);setSmsOk(true);const m=aktifAdim?SMS_MESAJLARI[aktifAdim.ad]?.(dosya)||"":"";setSmsMesajlar(p=>[{id:Date.now(),tarih:new Date().toLocaleDateString("tr-TR"),saat:new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"}),durum:"iletildi",adim:aktifAdim?.ad||"",alici:dosya.sahip.telefon,n:m.length,oto:false},...p]);setTimeout(()=>setSmsOk(false),3000);},1800);};

function App(){
  const [ekran,setEkran]=useState("rolsecim");
  const [wizardAcik,setWizardAcik]=useState(false);
  const [kullanici,setKullanici]=useState(null);

  const giris=(k)=>{setKullanici(k);setEkran(`${k.rol}-${k.rol==="admin"?"dashboard":k.rol==="servis"?"panel":k.rol==="acente"?"panel":"panel"}`);};

  return(
    <>
      {ekran==="rolsecim"&&<RolSecim onRol={r=>setEkran(`${r}-giris`)}/>}
      {ekran==="admin-giris"   &&<AdminGiris   onGiris={giris} onGeri={()=>setEkran("rolsecim")}/>}
      {ekran==="servis-giris"  &&<ServisGiris  onGiris={giris} onGeri={()=>setEkran("rolsecim")}/>}
      {ekran==="acente-giris"  &&<AcenteGiris  onGiris={giris} onGeri={()=>setEkran("rolsecim")}/>}
      {ekran==="musteri-giris" &&<MusteriGiris onGiris={giris} onGeri={()=>setEkran("rolsecim")}/>}
      {ekran==="admin-dashboard"&&(
        <>
          <AdminDashboard onDosyaSec={()=>setEkran("admin-panel")} onYeniDosya={()=>setWizardAcik(true)} onCikis={()=>{setEkran("rolsecim");setKullanici(null);}} onServisDetay={(id)=>{setKullanici(k=>({...k,servisDetayId:id}));setEkran("admin-servis-detay");}}/>
          {wizardAcik&&<YeniDosyaWizard onKapat={()=>setWizardAcik(false)} onKaydet={()=>{setWizardAcik(false);setEkran("admin-panel");}}/>}
        </>
      )}
      {ekran==="admin-panel"  &&<AdminPanel  onCikis={()=>setEkran("admin-dashboard")}/>}
      {ekran==="admin-servis-detay"&&<ServisDetayAdmin servisId={kullanici?.servisDetayId} onGeri={()=>setEkran("admin-dashboard")}/>}
      {ekran==="servis-panel" &&<ServisPanel servisBilgi={kullanici?.servis||SERVISLER[0]} onCikis={()=>{setEkran("rolsecim");setKullanici(null);}}/>}
      {ekran==="acente-panel" &&<AcentePanel onCikis={()=>{setEkran("rolsecim");setKullanici(null);}}/>}
      {ekran==="musteri-panel"&&<MusteriPanel onCikis={()=>{setEkran("rolsecim");setKullanici(null);}}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
